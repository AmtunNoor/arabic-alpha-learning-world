<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha Learning World V8 Locked</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family:'Fredoka',sans-serif;
}

/* ================= INTRO ================= */

#intro{
  position:fixed;
  inset:0;
  z-index:99999;
  background:
    radial-gradient(circle at center,#1b2742,#05070f);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* floating arabic letters */

.introLetter{
  position:absolute;
  font-size:55px;
  opacity:.18;
  filter:blur(.3px);
  font-weight:bold;
  animation:introFloat linear infinite;
}

@keyframes introFloat{

  from{
    transform:
      translateY(120vh)
      rotate(0deg);
  }

  to{
    transform:
      translateY(-120vh)
      rotate(360deg);
  }

}

#title{

  position:relative;
  z-index:2;

  font-family:'Baloo 2',cursive;

  font-size:88px;
  font-weight:800;

  color:white;

  letter-spacing:2px;

  text-shadow:
    0 0 12px rgba(255,255,255,.35),
    0 0 28px rgba(255,255,255,.22);

  animation:titlePop 2.5s ease-in-out infinite;

}

#title span{

  display:inline-block;

  font-size:108px;

  font-weight:900;

  animation:namePop 2.4s ease-in-out infinite;

}

@keyframes titlePop{

  50%{
    transform:translateY(-6px);
  }

}

@keyframes namePop{

  0%{
    transform:scale(.4);
    opacity:0;
  }

  45%{
    transform:scale(1.18);
    opacity:1;
  }

  100%{
    transform:scale(1);
  }

}

#sub{

  position:relative;
  z-index:2;

  margin-top:24px;

  font-family:'Baloo 2',cursive;

  color:#fff7cf;

  text-shadow:
    0 0 14px rgba(255,255,255,.25);

}

#sub small{

  display:block;

  font-size:22px;

  opacity:.75;

  margin-bottom:6px;

}

.kidsNames{

  font-size:52px;

  font-weight:900;

  color:#fff4b8;

  animation:kidsFloat 2.2s ease-in-out infinite;

}

@keyframes kidsFloat{

  50%{
    transform:
      translateY(-8px)
      scale(1.05);
  }

}

/* ================= BACKGROUNDS ================= */

.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.5s ease;
  z-index:-7;
}

#bg2{
  opacity:0;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.20);
  z-index:-6;
}

/* ================= WORLD ================= */

#world{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:-5;
}

.obj{
  position:absolute;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
  opacity:.92;
}

/* ================= OBJECT ANIMS ================= */

.snowAnim{
  animation-name:snowFall;
}

@keyframes snowFall{

  from{
    transform:
      translateY(-10vh)
      translateX(0px);
  }

  to{
    transform:
      translateY(120vh)
      translateX(50px);
  }

}

.oceanAnim{
  animation-name:oceanMove;
}

@keyframes oceanMove{

  from{
    transform:
      translateX(-20vw)
      translateY(0px);
  }

  to{
    transform:
      translateX(120vw)
      translateY(-25px);
  }

}

.gardenAnim{
  animation-name:gardenFloat;
}

@keyframes gardenFloat{

  from{
    transform:
      translateY(110vh)
      rotate(0deg);
  }

  to{
    transform:
      translateY(-20vh)
      rotate(360deg);
  }

}

.forestAnim{
  animation-name:forestDrift;
}

@keyframes forestDrift{

  from{
    transform:
      translateY(-20vh)
      translateX(0px);
  }

  to{
    transform:
      translateY(120vh)
      translateX(90px);
  }

}

/* ================= HUD ================= */

#hud{
  position:fixed;
  top:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 18px;
  z-index:50;
  font-size:20px;
  font-weight:bold;
}

/* ================= APP ================= */

#app{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:20px;
  padding:20px;
}

/* ================= LETTER ================= */

#letter{
  font-size:155px;
  background:rgba(255,255,255,.13);
  padding:25px 55px;
  border-radius:30px;
  backdrop-filter:blur(6px);

  box-shadow:
    0 0 30px rgba(255,255,255,.12);

  transition:transform .4s ease;
}

/* ================= ACTION ================= */

#action{
  font-size:110px;
}

/* ================= PHRASE ================= */

#phrase{
  min-height:40px;
  font-size:30px;
  font-weight:bold;
  color:#ffe28a;
}

/* ================= CONTROLS ================= */

#controls{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  z-index:100;
}

button,select{

  border:none;
  border-radius:12px;

  padding:10px 14px;

  font-size:14px;
  font-weight:bold;

  background:white;
  color:black;

}

/* ================= STAR ================= */

#starWrap{
  position:fixed;
  top:50%;
  left:50%;
  transform:
    translate(-50%,-50%)
    scale(0);

  z-index:999;

  font-size:180px;

  opacity:0;
}

.starPop{
  animation:starPop .9s ease;
}

@keyframes starPop{

  0%{
    transform:
      translate(-50%,-50%)
      scale(0);
    opacity:0;
  }

  50%{
    transform:
      translate(-50%,-50%)
      scale(1.4);
    opacity:1;
  }

  100%{
    transform:
      translate(-50%,-50%)
      scale(0);
    opacity:0;
  }

}

/* ================= V7.5 CINEMATIC ================= */

.calm{
  animation:softFloat 2.5s ease-in-out;
}

.fun{
  animation:bounce .8s infinite;
}

.surprise{
  animation:surprise .5s ease;
}

@keyframes softFloat{
  50%{
    transform:translateY(-12px);
  }
}

@keyframes bounce{
  50%{
    transform:translateY(-24px);
  }
}

@keyframes surprise{
  50%{
    transform:
      scale(1.18)
      rotate(4deg);
  }
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  #title{
    font-size:52px;
    text-align:center;
    padding:0 20px;
  }

  #title span{
    font-size:68px;
    display:block;
  }

  .kidsNames{
    font-size:34px;
  }

  #letter{
    font-size:100px;
    padding:20px 35px;
  }

  #action{
    font-size:85px;
  }

  #phrase{
    font-size:22px;
  }

}

</style>
</head>

<body>

<!-- ================= INTRO ================= -->

<div id="intro">

  <div id="title">
    Created by <span>Amtun Noor</span>
  </div>

  <div id="sub">
    <small>For</small>

    <div class="kidsNames">
      Mariam & Hamza
    </div>
  </div>

</div>

<!-- ================= BACKGROUNDS ================= -->

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="overlay"></div>

<!-- ================= WORLD ================= -->

<div id="world"></div>

<!-- ================= HUD ================= -->

<div id="hud">

  <div id="level">
    Level 1
  </div>

  <div id="stars">
    ⭐ 0
  </div>

</div>

<!-- ================= STAR ================= -->

<div id="starWrap">
  ⭐
</div>

<!-- ================= APP ================= -->

<div id="app">

  <div id="letter">ا</div>

  <div id="action">👏</div>

  <div id="phrase"></div>

</div>

<!-- ================= CONTROLS ================= -->

<div id="controls">

<select id="speedSelect">
  <option value="fast">FAST</option>
  <option value="normal" selected>NORMAL</option>
  <option value="slow">SLOW</option>
</select>

<select id="modeSelect">
  <option value="auto">AUTO</option>
  <option value="manual">MANUAL</option>
</select>

<select id="orderSelect">
  <option value="sequence">SEQUENCE</option>
  <option value="random">RANDOM</option>
</select>

<button onclick="next()">
  NEXT
</button>

<button onclick="togglePause()">
  PAUSE
</button>

</div>

<script>

/* ================= INTRO LETTERS ================= */

const introLetters=[
  "ا","ب","ت","ث","ج","ح","خ","د","ر","س","ش","ص"
];

for(let i=0;i<28;i++){

  const d=document.createElement("div");

  d.className="introLetter";

  d.innerText=
    introLetters[
      Math.floor(
        Math.random()*introLetters.length
      )
    ];

  d.style.left=Math.random()*100+"vw";

  d.style.animationDuration=
    (8+Math.random()*10)+"s";

  d.style.fontSize=
    (30+Math.random()*50)+"px";

  document.getElementById("intro")
    .appendChild(d);

}

/* ================= CORE ================= */

let current=0;
let stars=0;
let level=1;

let autoMode=true;
let paused=false;
let randomMode=false;

let speed=2500;

let bgFlip=true;

let started=false;

/* ================= AUDIO ================= */

const laudio=new Audio();
const aaudio=new Audio();
const praiseAudio=new Audio();

const starSound=
  new Audio(
    "assets/sounds/system/star.mp3"
  );

starSound.volume=.14;

const ambient=
  new Audio(
    "assets/sounds/system/ambient.mp3"
  );

ambient.loop=true;
ambient.volume=.12;

/* ================= DATA ================= */

const letters=[
"ا","ب","ت","ث","ج","ح","خ",
"د","ذ","ر","ز","س","ش","ص",
"ض","ط","ظ","ع","غ","ف","ق",
"ك","ل","م","ن","ه","و","ي"
];

const actions=[
"👏","🦋","🏃","💤","🌟","🐠","🚶","🌀"
];

const phrases=[
"AMAZING!",
"FANTASTIC!",
"WELL DONE!",
"GREAT JOB!"
];

const themes=[

{
name:"snow",
bg:"assets/images/themes/snow.webp",
items:["❄️","❄️","🌨️"],
anim:"snowAnim"
},

{
name:"garden",
bg:"assets/images/themes/garden.webp",
items:["🌸","🦋","🌼"],
anim:"gardenAnim"
},

{
name:"ocean",
bg:"assets/images/themes/ocean.webp",
items:["🐠","🐟","🫧"],
anim:"oceanAnim"
},

{
name:"forest",
bg:"assets/images/themes/forest.webp",
items:["🍃","🌿","🌱"],
anim:"forestAnim"
}

];

/* ================= DOM ================= */

const levelText=document.getElementById("level");
const starsText=document.getElementById("stars");
const starWrap=document.getElementById("starWrap");
const letter=document.getElementById("letter");
const action=document.getElementById("action");
const phrase=document.getElementById("phrase");
const world=document.getElementById("world");
const bg1=document.getElementById("bg1");
const bg2=document.getElementById("bg2");
const intro=document.getElementById("intro");

/* ================= THEMES ================= */

function setTheme(){

  const theme=
    themes[(level-1)%themes.length];

  levelText.innerText=
    `Level ${level}`;

  const nextBg=
    bgFlip
      ? bg2
      : bg1;

  const oldBg=
    bgFlip
      ? bg1
      : bg2;

  nextBg.style.backgroundImage=
    `url('${theme.bg}')`;

  nextBg.style.opacity=1;

  oldBg.style.opacity=0;

  bgFlip=!bgFlip;

  spawnWorld(theme);

}

/* ================= WORLD ================= */

function spawnWorld(theme){

  world.innerHTML="";

  for(let i=0;i<14;i++){

    const d=document.createElement("div");

    d.className=
      `obj ${theme.anim}`;

    d.innerText=
      theme.items[
        Math.floor(
          Math.random()*theme.items.length
        )
      ];

    d.style.left=
      Math.random()*100+"vw";

    d.style.top=
      Math.random()*100+"vh";

    d.style.fontSize=
      (20+Math.random()*40)+"px";

    d.style.animationDuration=
      (6+Math.random()*8)+"s";

    world.appendChild(d);

  }

}

/* ================= CINEMATIC ================= */

const scenes=[
  "calm",
  "fun",
  "surprise"
];

function cinematic(){

  const s=
    scenes[
      Math.floor(
        Math.random()*scenes.length
      )
    ];

  letter.classList.remove(
    "calm",
    "fun",
    "surprise"
  );

  letter.classList.add(s);

}

/* ================= STAR ================= */

function showStar(){

  stars++;

  starsText.innerText=
    `⭐ ${stars}`;

  starWrap.classList.remove(
    "starPop"
  );

  void starWrap.offsetWidth;

  starWrap.classList.add(
    "starPop"
  );

  const s=starSound.cloneNode();

  s.volume=.14;

  setTimeout(()=>{

    s.play().catch(()=>{});

  },120);

}

/* ================= AUDIO QUEUE SAFE ================= */

function playSequence(){

  laudio.pause();
  aaudio.pause();
  praiseAudio.pause();

  laudio.currentTime=0;
  aaudio.currentTime=0;
  praiseAudio.currentTime=0;

  laudio.src=
    "assets/sounds/letters/alif.mp3";

  aaudio.src=
    "assets/sounds/actions/clap.mp3";

  praiseAudio.src=
    "assets/sounds/phrases/amazing.mp3";

  laudio.play().catch(()=>{});

  laudio.onended=()=>{

    aaudio.play().catch(()=>{});

    aaudio.onended=()=>{

      praiseAudio.play().catch(()=>{});

    };

  };

}

/* ================= STEP ================= */

function step(){

  if(paused) return;

  let idx;

  if(randomMode){

    idx=
      Math.floor(
        Math.random()*letters.length
      );

  }else{

    idx=
      current % letters.length;

  }

  letter.innerText=
    letters[idx];

  action.innerText=
    actions[
      Math.floor(
        Math.random()*actions.length
      )
    ];

  phrase.innerText=
    phrases[
      Math.floor(
        Math.random()*phrases.length
      )
    ];

  cinematic();

  playSequence();

  setTheme();

  showStar();

  current++;

  if(current%5===0){

    level++;

  }

}

/* ================= NEXT ================= */

function next(){

  step();

}

/* ================= SPEED ================= */

function restartLoop(){

  clearInterval(window.loop);

  window.loop=setInterval(()=>{

    if(autoMode && !paused){

      step();

    }

  },speed);

}

speedSelect.onchange=function(){

  speed=
    this.value==="fast"
      ? 1200
      : this.value==="normal"
      ? 2500
      : 4500;

  restartLoop();

};

/* ================= MODE ================= */

modeSelect.onchange=function(){

  autoMode=
    this.value==="auto";

};

orderSelect.onchange=function(){

  randomMode=
    this.value==="random";

};

/* ================= PAUSE ================= */

function togglePause(){

  paused=!paused;

  if(paused){

    ambient.pause();

  }else{

    ambient.play().catch(()=>{});

  }

}

/* ================= START ================= */

function startGame(){

  if(started) return;

  started=true;

  intro.remove();

  ambient.play().catch(()=>{});

  step();

  restartLoop();

}

/* ================= AUTOSTART SAFE ================= */

window.addEventListener(
  "load",
  ()=>{

    setTimeout(()=>{

      startGame();

    },3500);

  }
);

/* mobile/audio unlock */

document.body.addEventListener(
  "click",
  ()=>{

    startGame();

  },
  {once:true}
);

</script>

</body>
</html>
