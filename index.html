<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arabic Learning World - Stable v9</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
  color:white;
}

/* BACKGROUND */
#bg1,#bg2{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.2s ease;
  z-index:-3;
}
#bg2{opacity:0;}

/* PARTICLES */
#fx{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.25);
  z-index:-1;
}

/* MAIN UI */
#app{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;
}

#letter{
  font-size:160px;
  padding:30px 60px;
  background:rgba(255,255,255,0.15);
  border-radius:30px;
}

#action{
  font-size:140px;
}

#phrase{
  font-size:28px;
  color:#ffe08a;
}

#hud{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  font-size:22px;
}

/* STAR */
#star{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:140px;
  text-align:center;
  opacity:0;
}

#star span{
  display:block;
  font-size:30px;
}

.starAnim{
  animation:pop 0.9s ease;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);}
  50%{transform:translate(-50%,-50%) scale(1.5);}
  100%{transform:translate(-50%,-50%) scale(0);}
}

/* BALLOONS */
.balloon{
  position:fixed;
  bottom:-100px;
  font-size:50px;
  z-index:9999;
  animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
  to{transform:translateY(-120vh);opacity:0;}
}

/* ACTION ANIMATION */
.clap{animation:clap 0.7s infinite;}
.jump{animation:jump 0.7s infinite;}
.spin{animation:spin 1s linear infinite;}

@keyframes clap{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.3);}
}
@keyframes jump{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-50px);}
}
@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div id="bg1"></div>
<div id="bg2"></div>

<canvas id="fx"></canvas>

<div class="overlay"></div>

<div id="hud">
  <div id="level">Level 1 🌿</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="star">⭐<span>0</span></div>

<div id="app">
  <div id="letter">ا</div>
  <div id="action">👋</div>
  <div id="phrase"></div>
</div>

<button onclick="next()" style="
position:fixed;
bottom:20px;
right:20px;
z-index:9999;
padding:10px;
font-size:16px;
opacity:0.6;
">
NEXT
</button>

<script>

/* ================= DATA ================= */

const letters=[
  {a:"ا",audio:"assets/sounds/letters/alif.mp3"},
  {a:"ب",audio:"assets/sounds/letters/ba.mp3"},
  {a:"ت",audio:"assets/sounds/letters/ta.mp3"}
];

const actions=[
  {icon:"👏",name:"clap",text:"Clap your hands!",audio:"assets/sounds/actions/clap.mp3"},
  {icon:"🦘",name:"jump",text:"Jump high!",audio:"assets/sounds/actions/jump.mp3"},
  {icon:"🌀",name:"spin",text:"Spin around!",audio:"assets/sounds/actions/spin.mp3"}
];

/* THEMES */
const themes=[
  ["assets/images/themes/forest.webp","assets/images/themes/forest_2.webp"],
  ["assets/images/themes/garden.webp","assets/images/themes/garden_2.webp"],
  ["assets/images/themes/ocean.webp","assets/images/themes/ocean_2.webp"],
  ["assets/images/themes/rainbow.webp","assets/images/themes/rainbow_2.webp"]
];

const worldMap=["forest","garden","ocean","rainbow"];

/* ================= AMBIENCE ================= */

const ambience={
  forest:new Audio("assets/sounds/ambience/forest.mp3"),
  garden:new Audio("assets/sounds/ambience/garden.mp3"),
  ocean:new Audio("assets/sounds/ambience/ocean.mp3"),
  rainbow:new Audio("assets/sounds/ambience/rainbow.mp3")
};

Object.values(ambience).forEach(a=>{
  a.loop=true;
  a.volume=0.35;
});

/* ================= STATE ================= */

let i=0;
let stars=0;
let level=1;
let flip=true;

const laudio=new Audio();
const aaudio=new Audio();

/* ================= PARTICLES ================= */

const canvas=document.getElementById("fx");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
let currentWorld="forest";

function setParticles(type){
  currentWorld=type;
  particles=[];
  for(let i=0;i<70;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*3+1,
      d:Math.random()*1+0.3,
      type
    });
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.fillStyle="white";

    if(p.type==="forest"){
      p.y+=p.d;
      p.x+=Math.sin(p.y/30)*0.5;
      if(p.y>canvas.height)p.y=0;
      ctx.fillRect(p.x,p.y,p.r,p.r);
    }

    if(p.type==="garden"){
      p.y+=p.d;
      p.x+=Math.sin(p.y/25);
      if(p.y>canvas.height)p.y=0;
      ctx.fillRect(p.x,p.y,p.r,p.r);
    }

    if(p.type==="ocean"){
      p.y+=0.5;
      p.x+=Math.sin(p.y/40);
      if(p.y>canvas.height)p.y=0;
      ctx.fillRect(p.x,p.y,p.r,p.r);
    }

    if(p.type==="rainbow"){
      p.y+=1;
      p.x+=Math.sin(p.y/10)*2;
      if(p.y>canvas.height)p.y=0;
      ctx.fillRect(p.x,p.y,p.r,p.r);
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* ================= THEME ================= */

function setTheme(){

  const set=themes[level-1]||themes[0];

  const next=flip?bg2:bg1;
  const curr=flip?bg1:bg2;

  next.style.backgroundImage=`url('${set[i%2]}')`;
  next.style.opacity=1;
  curr.style.opacity=0;

  flip=!flip;

  const world=worldMap[level-1]||"forest";

  setParticles(world);

  Object.values(ambience).forEach(a=>{
    a.pause();
    a.currentTime=0;
  });

  ambience[world].play().catch(()=>{});

}

/* ================= STAR ================= */

function showStar(){

  stars++;
  document.getElementById("stars").innerText=`⭐ ${stars}`;

  const s=document.getElementById("star");

  s.innerHTML=`⭐<span>${stars}</span>`;

  s.classList.remove("starAnim");
  void s.offsetWidth;
  s.classList.add("starAnim");

}

/* ================= BALLOONS ================= */

function balloons(){
  for(let i=0;i<6;i++){
    const el=document.createElement("div");
    el.className="balloon";
    el.innerText="🎈";
    el.style.left=Math.random()*100+"vw";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

/* ================= CORE ================= */

function step(){

  const L=letters[i];
  const A=actions[Math.floor(Math.random()*actions.length)];

  document.getElementById("letter").innerText=L.a;

  laudio.pause();
  laudio.currentTime=0;
  laudio.src=L.audio;
  laudio.play().catch(()=>{});

  const act=document.getElementById("action");
  act.innerText=A.icon;
  act.className="";
  void act.offsetWidth;
  act.className=A.name;

  document.getElementById("phrase").innerText=A.text;

  setTimeout(()=>{

    aaudio.pause();
    aaudio.currentTime=0;
    aaudio.src=A.audio;
    aaudio.play().catch(()=>{});

  },800);

  setTheme();
}

/* ================= NEXT ================= */

function next(){

  showStar();

  if(i%2===0){
    level++;
    document.getElementById("level").innerText=`Level ${level}`;
    balloons();
  }

  i++;

  if(i>=letters.length)i=0;

  step();
}

/* ================= START ================= */

window.onload=()=>{
  step();
  setInterval(next,4000);
};

</script>

</body>
</html>
