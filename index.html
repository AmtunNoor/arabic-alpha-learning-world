<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha World</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Baloo 2','Fredoka',cursive;
  background:#000;
  color:#fff;
}

/* BACKGROUND LAYERS */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.5s ease;
  opacity:0;
  z-index:-10;
}
#bg1{opacity:1;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:-9;}

/* PARTICLES (THEME SPECIFIC) */
#particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:-8;
}

.floatObj{
  position:absolute;
  animation:float 10s linear infinite;
}

@keyframes float{
  from{transform:translateY(-10vh);}
  to{transform:translateY(120vh);}
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  font-size:20px;
  z-index:100;
}

/* LETTER */
#letter{
  font-size:160px;
  padding:20px 50px;
  border-radius:30px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(6px);
}

/* ACTION */
#action{
  font-size:120px;
}

/* PHRASE */
#phrase{
  font-size:34px;
  color:#ffe082;
  min-height:50px;
  text-align:center;
}

/* MASCOT */
#mascot{
  position:fixed;
  bottom:90px;
  right:20px;
  font-size:60px;
  animation:bounce 1.5s infinite;
}
@keyframes bounce{50%{transform:translateY(-10px);}}

/* STAR CENTER */
#star{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:200px;
  opacity:0;
}
.starPop{
  animation:pop 1s ease;
}
@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;}
  50%{transform:translate(-50%,-50%) scale(1.4);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(0);opacity:0;}
}

/* CONTROLS */
#controls{
  position:fixed;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  z-index:200;
}
select,button{
  padding:8px 12px;
  border-radius:10px;
  border:none;
  font-weight:bold;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:30px;
  background:rgba(0,0,0,.6);
  z-index:9999;
}

.splashBox{
  font-size:60px;
  padding:20px 40px;
  border-radius:30px;
  background:linear-gradient(45deg,#ff4d4d,#ffd700,#4dd0ff,#7cff4d);
  animation:pulse 2s infinite;
  text-align:center;
}

@keyframes pulse{
  50%{transform:scale(1.05);}
}

</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<div id="particles"></div>

<div id="splash">
  <div class="splashBox">✨ Created by Amtun Noor</div>
  <div class="splashBox">💖 For Mariam & Hamza</div>
</div>

<div id="hud">
  <div id="level">Level 1 ❄️</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="star">⭐</div>

<div id="mascot">🧸</div>

<div id="letter">ا</div>
<div id="action">👏</div>
<div id="phrase">Welcome!</div>

<div id="controls">
<select id="speed">
<option value="fast">FAST</option>
<option value="normal" selected>NORMAL</option>
<option value="slow">SLOW</option>
</select>

<select id="order">
<option value="seq" selected>SEQUENCE</option>
<option value="rand">RANDOM</option>
</select>

<button onclick="start()">START</button>
</div>

<script>

/* ===== DATA ===== */

const letters=[{a:"ا",audio:"assets/sounds/letters/alif.mp3"},{a:"ب",audio:"assets/sounds/letters/ba.mp3"}];

const actions=[
{icon:"👏",audio:"assets/sounds/actions/clap.mp3"},
{icon:"🦘",audio:"assets/sounds/actions/jump.mp3"},
{icon:"🏃",audio:"assets/sounds/actions/run.mp3"}
];

const themes=[
{img:["assets/images/themes/snow.webp","assets/images/themes/snow_2.webp"],objs:["❄️","☃️","✨"]},
{img:["assets/images/themes/ocean.webp","assets/images/themes/ocean_2.webp"],objs:["🌊","🐟","🫧"]}
];

/* ===== STATE ===== */

let i=0;
let level=1;
let busy=false;
let bgFlip=true;

/* ===== SPEED ENGINE ===== */

const speedMap={
fast:{a:500,b:400,c:400,d:600},
normal:{a:1000,b:900,c:800,d:1200},
slow:{a:1500,b:1200,c:1000,d:1800}
};

/* ===== UTIL ===== */

const wait=t=>new Promise(r=>setTimeout(r,t));

function play(src){
  return new Promise(r=>{
    const a=new Audio(src);
    a.onended=r;
    a.play().catch(r);
  });
}

/* ===== THEME ===== */

function setTheme(){
  const t=themes[level%themes.length];

  const bg=bgFlip?bg1:bg2;
  const old=bgFlip?bg2:bg1;

  bg.style.backgroundImage=`url(${t.img[0]})`;
  bg.style.opacity=1;
  old.style.opacity=0;

  bgFlip=!bgFlip;

  const p=document.getElementById("particles");
  p.innerHTML="";
  t.objs.forEach(o=>{
    let d=document.createElement("div");
    d.className="floatObj";
    d.innerText=o;
    d.style.left=Math.random()*100+"%";
    d.style.fontSize="30px";
    d.style.animationDuration=5+Math.random()*5+"s";
    p.appendChild(d);
  });
}

/* ===== REWARDS (QUEUE) ===== */

async function reward(){
  const star=document.getElementById("star");
  star.classList.add("starPop");
  await wait(900);
  star.classList.remove("starPop");
}

/* ===== MASTER TIMELINE ===== */

async function run(){

  if(busy) return;
  busy=true;

  const sp=speedMap[document.getElementById("speed").value];

  const L=letters[i%letters.length];
  const A=actions[Math.floor(Math.random()*actions.length)];

  setTheme();

  document.getElementById("letter").innerText=L.a;
  await play(L.audio);
  await wait(sp.a);

  document.getElementById("action").innerText=A.icon;
  await play(A.audio);
  await wait(sp.b);

  document.getElementById("phrase").innerText="Great Job!";
  await wait(sp.c);

  await reward();
  await wait(sp.d);

  i++;
  if(i%3===0){
    level++;
    document.getElementById("level").innerText="Level "+level;
  }

  busy=false;

  run(); // auto loop
}

/* ===== START ===== */

async function start(){
  await wait(4000);
  document.getElementById("splash").style.display="none";
  run();
}

</script>

</body>
</html>
