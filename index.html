<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha Learning World V3</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:'Fredoka',sans-serif;
  color:white;
}

/* SAFE APP AREA */
#app{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;
  padding:20px;
  padding-bottom:180px;
}

/* TV MODE */
@media(min-width:1200px){
  #letter{font-size:240px!important;}
  #action{font-size:160px!important;}
  #phrase{font-size:48px!important;}
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.2s ease;
  z-index:-10;
}

#bg2{opacity:0;}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.18);
  z-index:-9;
}

/* LETTER */
#letter{
  font-size:150px;
  background:rgba(255,255,255,.12);
  padding:25px 50px;
  border-radius:25px;
  backdrop-filter:blur(8px);
}

/* ACTION */
#action{font-size:110px;}

/* PHRASE SAFE */
#phrase{
  min-height:60px;
  font-size:28px;
  color:#ffe28a;
  text-align:center;
  padding-bottom:10px;
}

/* CONTROLS SAFE ZONE */
#controls{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  z-index:100;
}

/* BUTTONS */
button,select{
  padding:12px 14px;
  border-radius:14px;
  border:none;
  font-weight:bold;
  color:white;
  background:rgba(255,255,255,.12);
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 16px;
}

/* STAR */
#starWrap{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:180px;
  z-index:999;
}

.starPop{animation:pop .8s ease;}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);}
  50%{transform:translate(-50%,-50%) scale(1.4);}
  100%{transform:translate(-50%,-50%) scale(0);}
}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<div id="hud">
  <div id="level">Level 1</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="starWrap">⭐</div>

<div id="app">
  <div id="letter">ا</div>
  <div id="action">👏</div>
  <div id="phrase"></div>
</div>

<div id="controls">
<select id="speed">
<option value="fast">FAST</option>
<option value="normal" selected>NORMAL</option>
<option value="slow">SLOW</option>
</select>

<select id="mode">
<option value="auto">AUTO</option>
<option value="manual">MANUAL</option>
</select>

<select id="order">
<option value="seq">SEQUENCE</option>
<option value="rand">RANDOM</option>
</select>

<button onclick="next()">NEXT</button>
<button onclick="togglePause()">PAUSE</button>
</div>

<script>

/* ================= FULL THEME SET ================= */
const themes = [
{bg:"assets/images/themes/snow.webp",anim:"snowAnim"},
{bg:"assets/images/themes/snow_2.webp",anim:"snowAnim"},
{bg:"assets/images/themes/garden.webp",anim:"gardenAnim"},
{bg:"assets/images/themes/ocean.webp",anim:"oceanAnim"},
{bg:"assets/images/themes/ocean_2.webp",anim:"oceanAnim"},
{bg:"assets/images/themes/forest.webp",anim:"forestAnim"},
{bg:"assets/images/themes/forest_2.webp",anim:"forestAnim"},
{bg:"assets/images/themes/rainbow.webp",anim:"rainbowAnim"},
{bg:"assets/images/themes/rainbow_2.webp",anim:"rainbowAnim"},
{bg:"assets/images/themes/balloon.webp",anim:"balloonAnim"}
];

let level=1,stars=0,current=0;
let auto=true,paused=false,random=false;
let bgFlip=true,started=false;

/* AUDIO */
const ambient=new Audio("assets/sounds/system/ambient.mp3");
ambient.loop=true;

/* AUDIO UNLOCK (CRITICAL FIX) */
document.addEventListener("pointerdown",()=>{
  ambient.play().then(()=>ambient.pause()).catch(()=>{});
},{once:true});

/* PRELOAD ALL THEMES */
themes.forEach(t=>{
  const i=new Image();
  i.src=t.bg;
});

/* THEME ENGINE */
function setTheme(){
  const t=themes[level%themes.length];
  const next=bgFlip?bg2:bg1;
  const old=bgFlip?bg1:bg2;

  next.style.backgroundImage=`url('${t.bg}')`;
  next.style.opacity=1;
  old.style.opacity=0;

  bgFlip=!bgFlip;
}

/* CORE STEP */
function step(){
  setTheme();
  current++;
  if(current%5===0) level++;
}

/* NEXT */
function next(){step();}

/* PAUSE */
function togglePause(){
  paused=!paused;
  if(paused) ambient.pause();
  else ambient.play().catch(()=>{});
}

/* START */
function start(){
  if(started) return;
  started=true;

  document.getElementById("intro")?.remove();

  ambient.play().catch(()=>{});
  step();

  setInterval(()=>{
    if(auto && !paused) step();
  },2000);
}

/* START SAFE */
window.addEventListener("load",()=>{
  setTimeout(start,2000);
});

document.body.addEventListener("click",start,{once:true});

</script>

</body>
</html>
