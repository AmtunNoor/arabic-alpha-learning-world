<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha Learning World</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#05060a;
  font-family:Arial, sans-serif;
}

/* ================= SCENE SYSTEM ================= */
.scene{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:opacity 1.2s ease;
  color:white;
}

.scene.active{ opacity:1; }

/* ================= CINEMATIC INTRO ================= */
#intro{
  flex-direction:column;
  background:radial-gradient(circle at center, #0b0f1a, #05060a 70%);
}

.spotlight{
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(120,180,255,0.12), transparent 60%);
  animation:pulse 5s infinite;
}

.title{
  font-size:58px;
  letter-spacing:10px;
  text-shadow:0 0 30px rgba(120,180,255,0.25);
  animation:fadeIn 3.8s ease-in-out;
}

.subtitle{
  margin-top:18px;
  font-size:18px;
  opacity:0.7;
  letter-spacing:3px;
  animation:fadeIn 3.8s ease-in-out;
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.15); }
}

@keyframes fadeIn{
  0%{ opacity:0; transform:scale(1.15); }
  40%{ opacity:1; transform:scale(1); }
  100%{ opacity:0; transform:scale(0.98); }
}

/* ================= DEDICATION ================= */
#dedication{
  flex-direction:column;
  font-size:34px;
  letter-spacing:3px;
  text-align:center;
}

/* ================= GAME ================= */
#game{
  flex-direction:column;
}

/* ================= THEME LAYER ================= */
body.theme-applied{
  background-size:cover;
  background-position:center;
}
</style>
</head>

<body>

<!-- ================= INTRO (MERGED CINEMATIC) ================= -->
<div id="intro" class="scene active">
  <div class="spotlight"></div>
  <div class="title">AMTUN NOOR</div>
  <div class="subtitle">CINEMATIC LEARNING ENGINE</div>
</div>

<!-- ================= DEDICATION ================= -->
<div id="dedication" class="scene">
  <div>For Mariam & Hamza</div>
</div>

<!-- ================= GAME ================= -->
<div id="game" class="scene">
  <div>Loading Engine...</div>
</div>

<script>

/* ================= SPEED ENGINE ================= */
const Speed = {
  mode: "normal",
  m: 1,

  set(mode){
    this.mode = mode;
    if(mode==="fast") this.m = 1.8;
    else if(mode==="normal") this.m = 1;
    else if(mode==="slow") this.m = 0.6;
  },

  t(ms){ return ms / this.m; }
};

function delay(ms){
  return new Promise(r => setTimeout(r, Speed.t(ms)));
}

/* ================= THEME ENGINE ================= */
const Theme = {
  apply(name){
    const path = `images/themes/${name}.webp`;

    const img = new Image();
    img.onload = () => {
      document.body.style.backgroundImage = `url('${path}')`;
      document.body.classList.add("theme-applied");
    };
    img.onerror = () => console.warn("Theme missing:", path);

    img.src = path;
  }
};

/* ================= AUDIO ENGINE ================= */
const AudioEngine = {
  play(type, file){
    try{
      const a = new Audio(`sounds/${type}/${file}.mp3`);
      a.volume = 0.8;
      a.play().catch(()=>{});
    }catch(e){
      console.warn("Audio error", e);
    }
  }
};

/* ================= MAIN ENGINE ================= */
const Engine = {

  async boot(){
    try{

      await this.show("intro");
      await delay(3800);

      await this.show("dedication");
      await delay(3000);

      this.preload();

      await this.show("game");
      this.start();

    }catch(e){
      console.error(e);
      document.body.innerHTML =
        "<div style='color:white;background:black;height:100vh;display:flex;align-items:center;justify-content:center;'>Recovery Mode</div>";
    }
  },

  show(id){
    return new Promise(res => {

      document.querySelectorAll(".scene")
        .forEach(s => s.classList.remove("active"));

      document.getElementById(id).classList.add("active");

      setTimeout(res, 50);
    });
  },

  preload(){
    console.log("Preloading assets...");

    const test = new Image();
    test.src = "images/themes/default.webp";

    console.log("Sounds root:", "sounds/");
  },

  start(){
    document.getElementById("game").innerHTML =
      "<h2>Engine Active</h2><p>Learning system ready</p>";

    window.setMode = (m) => Speed.set(m);
  }

};

Engine.boot();

</script>

</body>
</html>
