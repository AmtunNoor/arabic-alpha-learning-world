<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha Learning World</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Baloo 2','Fredoka',cursive;
  background:black;
  color:white;
}

/* BACKGROUNDS */

.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 2s ease;
  transform:scale(1.05);
  z-index:-10;
}

#bg1{
  opacity:1;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.18);
  z-index:-9;
}

/* PARTICLES */

#particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:-8;
}

.floatObj{
  position:absolute;
  opacity:.9;
  animation:floatAnim linear infinite;
}

@keyframes floatAnim{

  from{
    transform:translateY(-15vh) rotate(0deg);
  }

  to{
    transform:translateY(120vh) rotate(360deg);
  }

}

/* SPLASH */

#splash{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:30px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px);
}

.splashText{
  font-size:70px;
  font-weight:bold;
  text-align:center;
  padding:20px 40px;
  border-radius:40px;
  background:linear-gradient(135deg,#ff69b4,#ffd700,#7cfc00,#00bfff);
  color:white;
  text-shadow:
    0 0 10px rgba(255,255,255,.5),
    0 0 20px rgba(255,255,255,.3);
  animation:bubblePop 2s infinite alternate;
  box-shadow:0 0 30px rgba(255,255,255,.25);
}

@keyframes bubblePop{

  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.06);
  }

}

/* APP */

#app{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:18px;
  padding:20px;
}

/* HUD */

#hud{
  position:fixed;
  top:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 18px;
  z-index:100;
  font-size:22px;
  font-weight:bold;
}

/* LETTER */

#letter{
  font-size:170px;
  background:rgba(255,255,255,.15);
  padding:25px 55px;
  border-radius:35px;
  backdrop-filter:blur(6px);
  min-width:240px;
  box-shadow:0 0 30px rgba(255,255,255,.2);
}

/* ACTION */

#action{
  font-size:120px;
  filter:drop-shadow(0 0 15px rgba(255,255,255,.3));
}

/* PHRASE */

#phrase{
  min-height:60px;
  font-size:36px;
  color:#ffe083;
  font-weight:bold;
  text-shadow:
    0 0 10px rgba(255,255,255,.5),
    0 0 20px rgba(255,200,0,.3);
  animation:bounceText 1s ease;
}

@keyframes bounceText{

  0%{
    transform:scale(.7);
    opacity:0;
  }

  50%{
    transform:scale(1.1);
    opacity:1;
  }

  100%{
    transform:scale(1);
  }

}

/* CONTROLS */

#controls{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  z-index:300;
}

select,button{
  border:none;
  border-radius:14px;
  padding:10px 14px;
  font-size:15px;
  font-weight:bold;
  font-family:'Baloo 2','Fredoka',cursive;
}

button{
  background:white;
  color:black;
}

/* STAR */

#starWrap{
  position:fixed;
  top:50%;
  left:50%;
  width:240px;
  height:240px;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;
  z-index:700;
}

#starShape{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:240px;
}

#starCount{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:62px;
  font-weight:bold;
  color:black;
}

.starPop{
  animation:starPop 1s ease;
}

@keyframes starPop{

  0%{
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
  }

  50%{
    transform:translate(-50%,-50%) scale(1.4);
    opacity:1;
  }

  100%{
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
  }

}

/* CONFETTI */

.confetti{
  position:fixed;
  width:14px;
  height:14px;
  z-index:600;
  animation:confettiFall 3s linear forwards;
}

@keyframes confettiFall{

  to{
    transform:translateY(120vh) rotate(720deg);
    opacity:0;
  }

}

/* BALLOONS */

.balloon{
  position:fixed;
  bottom:-120px;
  font-size:60px;
  animation:balloonUp 5s linear forwards;
  z-index:650;
}

@keyframes balloonUp{

  to{
    transform:translateY(-130vh);
    opacity:0;
  }

}

/* ACTION ANIMS */

.clap{animation:clap .7s infinite;}
.jump{animation:jump .8s infinite;}
.spin{animation:spin 1.2s linear infinite;}
.fly{animation:fly 1s infinite alternate;}
.run{animation:run .5s infinite alternate;}
.wave{animation:wave 1s infinite;}
.hop{animation:hop .7s infinite;}
.stretch{animation:stretch 1s infinite alternate;}

@keyframes clap{50%{transform:scale(1.3);}}
@keyframes jump{50%{transform:translateY(-40px);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fly{to{transform:translateX(20px);}}
@keyframes run{to{transform:translateX(20px);}}
@keyframes wave{50%{transform:rotate(18deg);}}
@keyframes hop{50%{transform:translateY(-25px);}}
@keyframes stretch{to{transform:scaleY(1.2);}}

/* MOBILE */

@media(max-width:768px){

  .splashText{
    font-size:38px;
    padding:18px 26px;
  }

  #letter{
    font-size:95px;
    min-width:150px;
    padding:18px 35px;
  }

  #action{
    font-size:85px;
  }

  #phrase{
    font-size:24px;
  }

  #hud{
    font-size:16px;
  }

  select,button{
    font-size:13px;
    padding:8px 10px;
  }

}

</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="overlay"></div>

<div id="particles"></div>

<div id="splash">

<div class="splashText">
✨ Created By Amtun Noor ✨
</div>

<div class="splashText">
💖 For Mariam & Hamza 💖
</div>

</div>

<div id="hud">

<div id="level">
Level 1 ❄️
</div>

<div id="stars">
⭐ 0
</div>

</div>

<div id="starWrap">

<div id="starShape">
⭐
</div>

<div id="starCount">
0
</div>

</div>

<div id="app">

<div id="letter">
ا
</div>

<div id="action">
👏
</div>

<div id="phrase">
🌟 Amazing!
</div>

</div>

<div id="controls">

<select id="speedSelect">

<option value="fast">
FAST
</option>

<option value="normal" selected>
NORMAL
</option>

<option value="slow">
SLOW
</option>

</select>

<select id="modeSelect">

<option value="auto" selected>
AUTO
</option>

<option value="manual">
MANUAL
</option>

</select>

<select id="orderMode">

<option value="sequence" selected>
SEQUENCE
</option>

<option value="random">
RANDOM
</option>

</select>

<button onclick="nextStep()">
NEXT
</button>

</div>

<script>

/* LETTERS */

const letters=[

{a:"ا",audio:"assets/sounds/letters/alif.mp3"},
{a:"ب",audio:"assets/sounds/letters/ba.mp3"},
{a:"ت",audio:"assets/sounds/letters/ta.mp3"},
{a:"ث",audio:"assets/sounds/letters/thaa.mp3"},
{a:"ج",audio:"assets/sounds/letters/jeem.mp3"},
{a:"ح",audio:"assets/sounds/letters/haa.mp3"},
{a:"خ",audio:"assets/sounds/letters/kha.mp3"},
{a:"د",audio:"assets/sounds/letters/daal.mp3"},
{a:"ذ",audio:"assets/sounds/letters/zaal.mp3"},
{a:"ر",audio:"assets/sounds/letters/raa.mp3"},
{a:"ز",audio:"assets/sounds/letters/zaa.mp3"},
{a:"س",audio:"assets/sounds/letters/seen.mp3"},
{a:"ش",audio:"assets/sounds/letters/sheen.mp3"},
{a:"ص",audio:"assets/sounds/letters/saad.mp3"},
{a:"ض",audio:"assets/sounds/letters/dad.mp3"},
{a:"ط",audio:"assets/sounds/letters/toa.mp3"},
{a:"ظ",audio:"assets/sounds/letters/zoa.mp3"},
{a:"ع",audio:"assets/sounds/letters/ain.mp3"},
{a:"غ",audio:"assets/sounds/letters/ghain.mp3"},
{a:"ف",audio:"assets/sounds/letters/fa.mp3"},
{a:"ق",audio:"assets/sounds/letters/qaaf.mp3"},
{a:"ك",audio:"assets/sounds/letters/kaaf.mp3"},
{a:"ل",audio:"assets/sounds/letters/laam.mp3"},
{a:"م",audio:"assets/sounds/letters/meem.mp3"},
{a:"ن",audio:"assets/sounds/letters/noon.mp3"},
{a:"ه",audio:"assets/sounds/letters/ha.mp3"},
{a:"و",audio:"assets/sounds/letters/waw.mp3"},
{a:"ي",audio:"assets/sounds/letters/yaa.mp3"}

];

/* THEMES */

const themes=[

{
name:"Snow ❄️",
images:[
"assets/images/themes/snow.webp",
"assets/images/themes/snow_2.webp"
],
objects:["❄️","⭐","✨","☃️","🧊"]
},

{
name:"Garden 🌸",
images:[
"assets/images/themes/garden.webp",
"assets/images/themes/garden_2.webp"
],
objects:["🌸","🦋","🌺","🌼","🐝"]
},

{
name:"Ocean 🌊",
images:[
"assets/images/themes/ocean.webp",
"assets/images/themes/ocean_2.webp"
],
objects:["🐠","🐟","🫧","🌊","🐚"]
},

{
name:"Rainbow 🌈",
images:[
"assets/images/themes/rainbow.webp",
"assets/images/themes/rainbow_2.webp"
],
objects:["🌈","⭐","💖","☁️","✨"]
},

{
name:"Forest 🌲",
images:[
"assets/images/themes/forest.webp",
"assets/images/themes/forest_2.webp"
],
objects:["🍃","🌲","🦜","🪵","🪲"]
}

];

/* ACTIONS */

const actions=[

{icon:"👏",name:"clap",audio:"assets/sounds/actions/clap.mp3"},
{icon:"🦘",name:"jump",audio:"assets/sounds/actions/jump.mp3"},
{icon:"🌀",name:"spin",audio:"assets/sounds/actions/spin.mp3"},
{icon:"✈️",name:"fly",audio:"assets/sounds/actions/fly.mp3"},
{icon:"🏃",name:"run",audio:"assets/sounds/actions/run.mp3"},
{icon:"🙌",name:"wave",audio:"assets/sounds/actions/wave.mp3"},
{icon:"🐸",name:"hop",audio:"assets/sounds/actions/hop.mp3"},
{icon:"🤸",name:"stretch",audio:"assets/sounds/actions/stretch.mp3"}

];

const praise=[
"🌟 Amazing!",
"🎉 Fantastic!",
"✨ Great Job!",
"💖 Keep Going!"
];

/* AUDIO */

const letterAudio=new Audio();
const actionAudio=new Audio();

/* STATE */

let current=0;
let stars=0;
let level=1;
let busy=false;
let autoMode=true;
let bgFlip=true;

/* SPEEDS */

const speeds={

fast:{
letter:700,
action:700,
praise:500,
next:1000
},

normal:{
letter:1200,
action:1200,
praise:900,
next:1800
},

slow:{
letter:1800,
action:1800,
praise:1300,
next:2600
}

};

/* PARTICLES */

function generateThemeObjects(){

  const holder=document.getElementById("particles");

  holder.innerHTML="";

  const theme=themes[(level-1)%themes.length];

  for(let i=0;i<18;i++){

    const obj=document.createElement("div");

    obj.className="floatObj";

    obj.innerText=
      theme.objects[
        Math.floor(Math.random()*theme.objects.length)
      ];

    obj.style.left=Math.random()*100+"vw";

    obj.style.fontSize=
      (18+Math.random()*22)+"px";

    obj.style.animationDuration=
      (10+Math.random()*10)+"s";

    obj.style.animationDelay=
      (-Math.random()*10)+"s";

    holder.appendChild(obj);

  }

}

/* THEMES */

function setTheme(){

  const theme=themes[(level-1)%themes.length];

  document.getElementById("level").innerText=
    `Level ${level} ${theme.name}`;

  const active=
    bgFlip
      ? document.getElementById("bg1")
      : document.getElementById("bg2");

  const hidden=
    bgFlip
      ? document.getElementById("bg2")
      : document.getElementById("bg1");

  hidden.style.backgroundImage=
    `url('${theme.images[current%2]}')`;

  hidden.style.opacity=1;

  setTimeout(()=>{

    active.style.opacity=0;

  },100);

  bgFlip=!bgFlip;

  generateThemeObjects();

}

/* AUDIO */

function playAudio(audio,src){

  return new Promise(resolve=>{

    audio.pause();

    audio.currentTime=0;

    audio.src=src;

    audio.onended=()=>resolve();

    audio.play().catch(()=>resolve());

  });

}

/* WAIT */

function wait(ms){

  return new Promise(r=>setTimeout(r,ms));

}

/* STAR */

async function showStar(){

  stars++;

  document.getElementById("stars").innerText=
    `⭐ ${stars}`;

  document.getElementById("starCount").innerText=
    stars;

  const wrap=document.getElementById("starWrap");

  wrap.classList.remove("starPop");

  void wrap.offsetWidth;

  wrap.classList.add("starPop");

  await wait(900);

}

/* CONFETTI */

async function showConfetti(){

  document
    .querySelectorAll(".confetti")
    .forEach(e=>e.remove());

  const colors=[
    "red","yellow","blue",
    "green","pink","orange"
  ];

  for(let i=0;i<16;i++){

    const c=document.createElement("div");

    c.className="confetti";

    c.style.left=Math.random()*100+"vw";

    c.style.top="-20px";

    c.style.background=
      colors[Math.floor(Math.random()*colors.length)];

    document.body.appendChild(c);

    setTimeout(()=>c.remove(),3000);

  }

  await wait(1200);

}

/* BALLOONS */

async function showBalloons(){

  document
    .querySelectorAll(".balloon")
    .forEach(e=>e.remove());

  const arr=["🎈","🎉","🌟","🪅"];

  for(let i=0;i<5;i++){

    const b=document.createElement("div");

    b.className="balloon";

    b.innerText=
      arr[Math.floor(Math.random()*arr.length)];

    b.style.left=Math.random()*100+"vw";

    document.body.appendChild(b);

    setTimeout(()=>b.remove(),5000);

  }

  await wait(1400);

}

/* MAIN ENGINE */

async function nextStep(){

  if(busy)return;

  busy=true;

  const speedType=
    document.getElementById("speedSelect").value;

  const timing=speeds[speedType];

  const orderMode=
    document.getElementById("orderMode").value;

  if(orderMode==="random"){

    current=
      Math.floor(Math.random()*letters.length);

  }

  const L=letters[current];

  const A=
    actions[
      Math.floor(Math.random()*actions.length)
    ];

  setTheme();

  /* LETTER */

  document.getElementById("letter").innerText=L.a;

  document.getElementById("phrase").innerText="";

  const action=document.getElementById("action");

  action.innerText=A.icon;

  action.className="";

  void action.offsetWidth;

  action.classList.add(A.name);

  await playAudio(letterAudio,L.audio);

  await wait(timing.letter);

  /* ACTION */

  document.getElementById("phrase").innerText=
    "🎯 Watch & Do!";

  await playAudio(actionAudio,A.audio);

  await wait(timing.action);

  /* PRAISE */

  document.getElementById("phrase").innerText=
    praise[
      Math.floor(Math.random()*praise.length)
    ];

  await wait(timing.praise);

  /* REWARDS */

  await showStar();

  await showConfetti();

  await showBalloons();

  /* LEVEL */

  current++;

  if(current%5===0){

    level++;

    document.getElementById("phrase").innerText=
      "🏆 LEVEL COMPLETE!";

    await wait(1800);

  }

  if(current>=letters.length){

    current=0;

  }

  busy=false;

  if(autoMode){

    await wait(timing.next);

    nextStep();

  }

}

/* CONTROLS */

document
.getElementById("modeSelect")
.addEventListener("change",e=>{

  autoMode=
    e.target.value==="auto";

});

/* START */

async function startGame(){

  setTheme();

  await wait(5000);

  document.getElementById("splash").style.display="none";

  nextStep();

}

window.onload=startGame;

</script>

</body>
</html>
