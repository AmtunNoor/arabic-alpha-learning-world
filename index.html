<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arabic Alpha Learning World V7.5</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
  color:white;
}

/* ================= BACKGROUND ================= */

.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.2s ease;
  z-index:-5;
}

#bg2{opacity:0;}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25);
  z-index:-4;
}

/* ================= HUD ================= */

#hud{
  position:fixed;
  top:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 18px;
  font-size:20px;
  font-weight:bold;
  z-index:10;
}

/* ================= LETTER ================= */

#letter{
  font-size:150px;
  background:rgba(255,255,255,0.12);
  padding:25px 50px;
  border-radius:30px;
  transition:transform .4s ease;
}

/* ================= ACTION ================= */

#action{
  font-size:110px;
}

/* ================= PHRASE ================= */

#phrase{
  font-size:28px;
  color:#ffe28a;
  min-height:40px;
  text-align:center;
}

/* ================= CONTROLS ================= */

#controls{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button,select{
  padding:10px 12px;
  border-radius:10px;
  border:none;
  font-weight:bold;
}

/* ================= STAR ================= */

#star{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:180px;
  z-index:100;
}

.pop{
  animation:pop .8s ease;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);}
  50%{transform:translate(-50%,-50%) scale(1.4);}
  100%{transform:translate(-50%,-50%) scale(0);}
}

/* ================= V7.5 CINEMATIC SCENES ================= */

.calm{
  animation:softFloat 2.6s ease-in-out;
}

.fun{
  animation:bounce 0.9s infinite;
}

.surprise{
  animation:popSpin 0.6s ease;
}

@keyframes softFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

@keyframes bounce{
  50%{transform:translateY(-22px);}
}

@keyframes popSpin{
  0%{transform:scale(0.6) rotate(0deg);}
  100%{transform:scale(1) rotate(360deg);}
}

/* ================= INTRO ================= */

#intro{
  position:fixed;
  inset:0;
  z-index:9999;
  background:radial-gradient(circle,#1a2438,#05070f);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#title{
  font-size:78px;
  font-weight:900;
  background:linear-gradient(90deg,#ff4fd8,#ffd166,#7cf7ff,#7dff9b);
  -webkit-background-clip:text;
  color:transparent;
  text-align:center;
}

#sub{
  font-size:36px;
  font-weight:900;
  margin-top:20px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div id="title">AMTUN NOOR</div>
  <div id="sub">For Mariam & Hamza</div>
</div>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<div id="hud">
  <div id="level">Level 1</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="star">⭐</div>

<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;">
  <div id="letter">ا</div>
  <div id="action">👏</div>
  <div id="phrase"></div>
</div>

<div id="controls">

<select id="speed">
  <option value="fast">FAST</option>
  <option value="normal" selected>NORMAL</option>
  <option value="slow">SLOW</option>
</select>

<select id="mode">
  <option value="auto">AUTO</option>
  <option value="manual">MANUAL</option>
</select>

<button onclick="next()">NEXT</button>

</div>

<script>

/* ================= CORE STATE ================= */

let i=0;
let stars=0;
let bgFlip=true;

/* ================= AUDIO (SAFE) ================= */

const starSound = new Audio("assets/sounds/system/star.mp3");

/* ================= CINEMATIC LAYER ================= */

const scenes=["calm","fun","surprise"];

function getScene(){
  return scenes[Math.floor(Math.random()*scenes.length)];
}

function applyScene(el,scene){
  el.classList.remove("calm","fun","surprise");
  el.classList.add(scene);
}

function cinematicSurprise(){
  if(Math.random()<0.22){
    const el=document.getElementById("letter");
    el.style.transform="scale(1.35) rotate(6deg)";
    setTimeout(()=>el.style.transform="scale(1)",400);
  }
}

function familiarity(){
  if(i>0 && i%6===0){
    phrase.innerText="YES! You already know this ⭐";
  }
}

/* ================= STAR ================= */

function showStar(){

  stars++;
  document.getElementById("stars").innerText="⭐ "+stars;

  const el=document.getElementById("star");
  el.classList.remove("pop");
  void el.offsetWidth;
  el.classList.add("pop");

  starSound.currentTime=0;
  starSound.play().catch(()=>{});

}

/* ================= THEMES ================= */

const themes=[
  "assets/images/themes/snow.webp",
  "assets/images/themes/garden.webp",
  "assets/images/themes/ocean.webp"
];

/* ================= STEP ================= */

function step(){

  const letters=["ا","ب","ت","ث","ج","ح","خ"];

  const letterEl=document.getElementById("letter");

  letterEl.innerText=letters[i%letters.length];

  const scene=getScene();
  applyScene(letterEl,scene);
  cinematicSurprise();
  familiarity();

  i++;

  showStar();

}

/* ================= NEXT ================= */

function next(){
  step();
}

/* ================= INTRO ================= */

document.body.addEventListener("click",()=>{

  document.getElementById("intro").remove();

  step();

});

</script>

</body>
</html>
