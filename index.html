<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha Learning World</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  transition:background 1s ease;
}

/* ================= BRAND INTRO ================= */
#intro{
  position:absolute; inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#0b0f1a;
  color:white;
}

.bigBubble{
  font-size:70px;
  font-weight:900;
  letter-spacing:6px;
  padding:20px 40px;
  border-radius:60px;
  background:linear-gradient(135deg,#ff4fd8,#6cc7ff,#ffe66d);
  background-size:300% 300%;
  animation:move 4s infinite;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.sub{
  margin-top:15px;
  font-size:18px;
  opacity:0.8;
}

/* ================= SECOND SCREEN ================= */
#dedication{
  position:absolute; inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#05060a;
  color:white;
}

.kidBubble{
  font-size:42px;
  padding:18px 30px;
  border-radius:50px;
  background:linear-gradient(135deg,#7ad7ff,#ff9ad5);
  animation:bounce 2s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

/* ================= GAME ================= */
#game{
  position:absolute; inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* STAR COUNTER */
.star{
  position:absolute;
  top:20px;
  right:20px;
  font-size:28px;
  animation:pop .4s ease;
}
@keyframes pop{
  from{transform:scale(0)}
  to{transform:scale(1)}
}

/* CONFETTI */
.confetti{
  position:absolute;
  width:6px;
  height:6px;
  background:yellow;
  animation:fall 2s linear forwards;
}
@keyframes fall{
  to{
    transform:translateY(600px) rotate(720deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="bigBubble">AMTUN NOOR</div>
  <div class="sub">CREATED BY AMTUN NOOR</div>
</div>

<!-- DEDICATION -->
<div id="dedication">
  <div class="kidBubble">For Mariam & Hamza</div>
</div>

<!-- GAME -->
<div id="game"></div>

<script>

/* ================= SPEED ================= */
const Speed={
  m:1,
  set(m){this.m=m==="fast"?1.8:m==="slow"?0.6:1},
  t(x){return x/this.m}
}
const wait=x=>new Promise(r=>setTimeout(r,Speed.t(x)))

/* ================= AUDIO LOCK ================= */
const AudioLock={
  busy:false,
  async play(src){
    while(this.busy) await wait(30)
    this.busy=true
    return new Promise(r=>{
      const a=new Audio(src)
      a.onended=()=>{this.busy=false;r()}
      a.onerror=()=>{this.busy=false;r()}
      a.play().catch(()=>{this.busy=false;r()})
    })
  }
}

/* ================= THEME ================= */
const Theme={
  apply(name){
    const img=new Image()
    const path=`images/themes/${name}.webp`
    img.onload=()=>{
      document.body.style.backgroundImage=`url('${path}')`
      document.body.style.backgroundSize="cover"
    }
    img.src=path
  }
}

/* ================= GAME CORE ================= */
const Game={

  level:0,
  stars:0,

  themes:["theme1","theme2","theme3"],

  start(){
    setTimeout(()=>this.run(),4000)
  },

  async run(){
    document.getElementById("intro").remove()
    document.getElementById("dedication").remove()

    this.loop()
  },

  async loop(){

    Theme.apply(this.themes[this.level] || "theme1")

    const letters=["ا","ب","ت","ث"] // fallback safe only

    for(const l of letters){

      await this.show(l)
      await AudioLock.play(`sounds/letters/${l}.mp3`)

      this.star()

      await this.effect("action")
      await AudioLock.play(`sounds/actions/action.mp3`)

      await this.effect("phrase")
      await AudioLock.play(`sounds/phrases/phrase.mp3`)

      await wait(600)
    }

    this.level++
    this.loop()
  },

  async show(l){
    document.getElementById("game").innerHTML=
      `<div style="font-size:90px">${l}</div>`
    await wait(600)
  },

  async effect(type){

    const game=document.getElementById("game")

    game.innerHTML=
      `<div style="font-size:40px">${type}</div>`

    this.confetti()
    await wait(500)
  },

  star(){
    this.stars++

    const s=document.createElement("div")
    s.className="star"
    s.innerText=`⭐ ${this.stars}`
    document.body.appendChild(s)

    setTimeout(()=>s.remove(),800)
  },

  confetti(){
    for(let i=0;i<12;i++){
      const c=document.createElement("div")
      c.className="confetti"
      c.style.left=Math.random()*window.innerWidth+"px"
      c.style.background=["#ff0","#0ff","#f0f","#0f0"][i%4]
      document.body.appendChild(c)
      setTimeout(()=>c.remove(),2000)
    }
  }

}

Game.start()

</script>
</body>
</html>
