<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arabic Alpha Learning World V6.5</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
  color:white;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.2s ease;
  z-index:-5;
}
#bg2{opacity:0}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25);
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  font-size:18px;
  z-index:10;
}

/* CORE */
#app{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

/* TILE */
#letter{
  font-size:150px;
  background:rgba(255,255,255,0.12);
  padding:20px 50px;
  border-radius:25px;
}

#action{font-size:110px}
#phrase{font-size:28px;color:#ffe28a}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#05070f;
  z-index:999;
}

#intro h1{
  font-size:70px;
  background:linear-gradient(90deg,#ff4fd8,#6cc7ff,#ffe66d);
  -webkit-background-clip:text;
  color:transparent;
  animation:glow 2s infinite;
}

#intro h2{
  font-size:26px;
  margin-top:10px;
  color:#7ad7ff;
}

@keyframes glow{
  50%{transform:scale(1.05)}
}

/* FX */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  animation:fall 2.5s linear forwards;
}
@keyframes fall{
  to{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* ACTIONS */
.clap{animation:clap .6s infinite}
.jump{animation:jump .6s infinite}
.spin{animation:spin 1s linear infinite}
.fly{animation:fly 1s infinite alternate}
.hop{animation:hop .6s infinite}
.run{animation:run .5s infinite alternate}
.wave{animation:wave 1s infinite}

@keyframes clap{50%{transform:scale(1.3)}}
@keyframes jump{50%{transform:translateY(-30px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fly{from{transform:translateX(-20px)}to{transform:translateX(20px)}}
@keyframes hop{50%{transform:translateY(-20px)}}
@keyframes run{from{transform:translateX(-15px)}to{transform:translateX(15px)}}
@keyframes wave{50%{transform:rotate(15deg)}}

button{
  padding:10px;
  border:none;
  border-radius:10px;
}

#controls{
  position:fixed;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>AMTUN NOOR</h1>
  <h2>For Mariam & Hamza</h2>
</div>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<div id="hud">
  <div id="level">Level 1</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="app">
  <div id="letter">ا</div>
  <div id="action">👏</div>
  <div id="phrase">...</div>
</div>

<div id="controls">
  <button onclick="setSpeed(2000)">FAST</button>
  <button onclick="setSpeed(4000)">NORMAL</button>
  <button onclick="setSpeed(6000)">SLOW</button>
  <button onclick="autoMode=!autoMode">AUTO</button>
</div>

<script>

/* ================= STATE ================= */
let current=0;
let level=1;
let stars=0;
let speed=4000;
let autoMode=true;
let busy=false;
let weakMap = {}; // adaptive memory

/* ================= DATA ================= */
const letters = [
{a:"ا",audio:"assets/sounds/letters/alif.mp3"},
{a:"ب",audio:"assets/sounds/letters/ba.mp3"},
{a:"ت",audio:"assets/sounds/letters/ta.mp3"}
];

const actions = [
{name:"clap",icon:"👏",audio:"assets/sounds/actions/clap.mp3"},
{name:"jump",icon:"🦘",audio:"assets/sounds/actions/jump.mp3"},
{name:"spin",icon:"🌀",audio:"assets/sounds/actions/spin.mp3"}
];

const phrases = [
"assets/sounds/phrases/amazing.mp3",
"assets/sounds/phrases/well-done.mp3"
];

/* ================= AUDIO QUEUE ================= */
const AudioQ = {
  q: Promise.resolve(),

  play(src){
    this.q = this.q.then(()=>new Promise(res=>{
      const a=new Audio(src);
      a.onended=res;
      a.onerror=res;
      a.play().catch(res);
    }));
    return this.q;
  }
};

/* ================= THEME FX ================= */
function themeIntensity(){
  const base = 1 + (level * 0.15);
  return Math.min(base, 2);
}

/* ================= INTRO REMOVE ================= */
setTimeout(()=>{
  document.getElementById("intro")?.remove();
}, 2500);

/* ================= FX ================= */
function confetti(){
  for(let i=0;i<15;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2500);
  }
}

/* ================= STAR ================= */
function star(){
  stars++;
  document.getElementById("stars").innerText="⭐ "+stars;
}

/* ================= THEME ================= */
function setTheme(){
  const img = `assets/images/themes/theme${(level%3)+1}.webp`;
  const bg = bg1.style.opacity==1?bg2:bg1;

  bg.style.backgroundImage=`url('${img}')`;
  bg.style.opacity=1;

  const prev = bg===bg1?bg2:bg1;
  prev.style.opacity=0;
}

/* ================= ADAPTIVE LOGIC ================= */
function markWeak(letter){
  weakMap[letter]=(weakMap[letter]||0)+1;
}

/* ================= PICK LETTER ================= */
function getLetter(){
  const weak = Object.entries(weakMap).sort((a,b)=>b[1]-a[1]);

  if(weak.length && Math.random()<0.5){
    return letters.find(l=>l.a===weak[0][0]) || letters[current];
  }

  return letters[current];
}

/* ================= CORE ================= */
async function run(){

  if(busy) return;
  busy=true;

  const L = getLetter();
  const A = actions[Math.floor(Math.random()*actions.length)];
  const P = phrases[Math.floor(Math.random()*phrases.length)];

  setTheme();

  letter.innerText=L.a;
  action.innerText=A.icon;
  phrase.innerText="";

  await AudioQ.play(L.audio);

  star();
  confetti();

  await AudioQ.play(A.audio);

  await AudioQ.play(P);

  phrase.innerText=P.split("/").pop().replace(".mp3","");

  busy=false;
}

/* ================= LOOP ================= */
setInterval(()=>{
  if(autoMode && !busy){
    current++;
    if(current>=letters.length){
      current=0;
      level++;
    }
    run();
  }
}, speed);

/* START */
run();

</script>
</body>
</html>
