<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning World V2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#000;
}

/* ================= SCREENS ================= */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  transition:1s;
}
.active{opacity:1;z-index:10}

/* ================= CREDIT ================= */
.credit{
  font-size:2.3rem;
  font-weight:bold;
  padding:20px 30px;
  border-radius:25px;
  color:#fff;
  animation:pulse 2s infinite alternate;
  text-align:center;
}
@keyframes pulse{
  0%{transform:scale(1);filter:brightness(1);}
  100%{transform:scale(1.2);filter:brightness(1.5);}
}

/* ================= THEMES ================= */
#c1{background:linear-gradient(45deg,#ff0066,#ffcc00);}
#c2{background:linear-gradient(45deg,#00c6ff,#0072ff);}

/* ================= GAME ================= */
#game{
  background:radial-gradient(circle,#111,#000);
}

/* ================= LETTER CARDS ================= */
.board{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.card{
  width:120px;
  height:120px;
  background:#fff;
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:2rem;
  transition:0.2s;
  user-select:none;
}
.card:hover{transform:scale(1.1)}

/* ================= UI ================= */
#hud{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:14px;
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:10px;
}

#reward{
  position:absolute;
  top:20px;
  right:20px;
  background:gold;
  color:black;
  padding:10px 20px;
  border-radius:30px;
  font-weight:bold;
  display:none;
  animation:pop 0.8s ease;
}

@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

/* ================= MASCOT ================= */
#mascot{
  position:absolute;
  bottom:15px;
  right:15px;
  width:80px;
  animation:bounce 2s infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

/* ================= PARTICLES ================= */
.particle{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  animation:float linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);opacity:0}
  50%{opacity:1}
  to{transform:translateY(-10vh);opacity:0}
}
</style>
</head>

<body>

<!-- CREDIT 1 -->
<div id="s1" class="screen active">
  <div id="c1" class="credit">Created by Amtun Noor</div>
</div>

<!-- CREDIT 2 -->
<div id="s2" class="screen">
  <div id="c2" class="credit">For Mariam & Hamza</div>
</div>

<!-- GAME -->
<div id="game" class="screen">

  <div id="hud"></div>
  <div id="reward">+ Coins</div>

  <div class="board" id="board"></div>

  <img id="mascot" src="https://i.imgur.com/4AiXzf8.png">
</div>

<script>

/* ================= STATE ENGINE ================= */
const state = {
  step:0,
  level:1,
  coins:0,
  streak:0,
  speed:"normal",
  lastItems:[],
  coop:{p1:0,p2:0},
  sessionStart:Date.now()
};

/* ================= SAVE SYSTEM ================= */
function save(){
  localStorage.setItem("mw_v2",JSON.stringify(state));
}
function load(){
  let d=localStorage.getItem("mw_v2");
  if(d)Object.assign(state,JSON.parse(d));
}
load();

/* ================= SPEED ENGINE ================= */
function getDelay(){
  if(state.speed==="fast") return 800;
  if(state.speed==="slow") return 2500;
  return 1500;
}

/* ================= ANTI-REPEAT SYSTEM ================= */
const letters = "ابتثجحخدذرزسشصضطظعغفقكلمنهوي".split("");

function pickLetter(){
  let filtered = letters.filter(l=>!state.lastItems.includes(l));
  if(filtered.length===0) filtered=letters;

  let choice = filtered[Math.floor(Math.random()*filtered.length)];

  state.lastItems.push(choice);
  if(state.lastItems.length>5) state.lastItems.shift();

  return choice;
}

/* ================= ENGINE TIMELINE ================= */
function next(){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));

  if(state.step===0){
    document.getElementById("s1").classList.add("active");
    setTimeout(next,3000);
  }

  else if(state.step===1){
    document.getElementById("s2").classList.add("active");
    setTimeout(next,3000);
  }

  else{
    document.getElementById("game").classList.add("active");
    startGame();
  }

  state.step++;
}

/* ================= GAME CORE ================= */
function startGame(){
  createParticles();
  loopGame();
}

/* ================= GAME LOOP ================= */
function loopGame(){
  renderBoard();
  updateHUD();
  save();

  setTimeout(loopGame,getDelay());
}

/* ================= BOARD ================= */
function renderBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";

  for(let i=0;i<6;i++){
    let d=document.createElement("div");
    d.className="card";
    d.innerText=pickLetter();

    d.onclick=()=>{
      reward();
      state.coop.p1++;
    };

    board.appendChild(d);
  }
}

/* ================= REWARD ENGINE ================= */
function reward(){
  state.coins += 10 * (1 + state.streak*0.1);
  state.streak++;

  let r=document.getElementById("reward");
  r.style.display="block";

  setTimeout(()=>r.style.display="none",800);

  if(state.streak % 5 === 0){
    levelUp();
  }
}

function levelUp(){
  state.level++;
  state.speed = state.level>3 ? "fast" : state.level>1 ? "normal" : "slow";

  flashMessage("LEVEL UP!");
}

/* ================= HUD ================= */
function updateHUD(){
  document.getElementById("hud").innerHTML=`
    Level: ${state.level}<br>
    Coins: ${Math.floor(state.coins)}<br>
    Speed: ${state.speed}<br>
    P1 Score: ${state.coop.p1}
  `;
}

/* ================= PARTICLES ================= */
function createParticles(){
  for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.background=["#ff0","#0ff","#f0f","#0f0"][Math.floor(Math.random()*4)];
    p.style.animationDuration=(3+Math.random()*4)+"s";

    document.body.appendChild(p);
  }
}

/* ================= SYSTEM NOTIFICATION ================= */
function flashMessage(msg){
  let r=document.getElementById("reward");
  r.innerText=msg;
  r.style.display="block";

  setTimeout(()=>{
    r.innerText="+ Coins";
    r.style.display="none";
  },1500);
}

/* ================= START ================= */
window.onload=()=>{
  next();
};

</script>

</body>
</html>
