<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Toddler Arabic Learning World</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
  background-size:cover;
  background-position:center;
  transition:background-image 1s ease;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

#app{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:15px;
}

#letter{
  font-size:150px;
  background:rgba(255,255,255,0.15);
  padding:30px 60px;
  border-radius:30px;
}

#actionAnim{
  font-size:90px;
  margin-top:10px;
  animation: none;
}

#phrase{
  font-size:26px;
  color:#ffe08a;
  font-weight:bold;
}

#speech{
  font-size:22px;
  opacity:0.95;
}

/* STAR */
#starPopup{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:120px;
  opacity:0;
  z-index:999;
}

.starAnim{
  animation:pop 0.8s ease;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;}
  50%{transform:translate(-50%,-50%) scale(1.4);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(0);opacity:0;}
}

#hud{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  font-size:22px;
}

.balloon{
  position:absolute;
  bottom:-100px;
  font-size:50px;
  animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
  to{transform:translateY(-120vh);opacity:0;}
}

/* SIMPLE ANIMATIONS */
.clap { animation: clap 0.6s infinite; }
.jump { animation: jump 0.6s infinite; }
.spin { animation: spin 1s linear infinite; }

@keyframes clap{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.2);}
}

@keyframes jump{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-40px);}
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="overlay"></div>

<div id="hud">
  <div id="level">Level 1 ❄️</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="starPopup">⭐</div>

<div id="app">

  <div id="letter">ا</div>

  <div id="actionAnim">👋</div>

  <div id="phrase">Listen and watch</div>

  <div id="speech">Clap your hands!</div>

</div>

<script>

const letters = [
  {a:"ا", audio:"assets/sounds/letters/alif.mp3"},
  {a:"ب", audio:"assets/sounds/letters/ba.mp3"},
  {a:"ت", audio:"assets/sounds/letters/ta.mp3"}
];

const actions = [
  {name:"clap", icon:"👏", text:"Clap your hands!"},
  {name:"jump", icon:"🦘", text:"Jump fast!"},
  {name:"spin", icon:"🌀", text:"Spin around!"}
];

const worlds = [
  "assets/images/themes/snow.webp",
  "assets/images/themes/garden.webp",
  "assets/images/themes/ocean.webp",
  "assets/images/themes/rainbow.webp"
];

let i=0;
let stars=0;
let level=1;

const audio = new Audio();

function render(){

  const L = letters[i];
  const act = actions[Math.floor(Math.random()*actions.length)];

  document.getElementById("letter").innerText = L.a;

  document.getElementById("actionAnim").innerText = act.icon;
  document.getElementById("actionAnim").className = act.name;

  document.getElementById("speech").innerText = act.text;
  document.getElementById("phrase").innerText = "Watch and imitate";

  document.body.style.backgroundImage =
    `url('${worlds[level-1] || worlds[0]}')`;

  audio.src = L.audio;
  audio.play().catch(()=>{});

}

function next(){

  stars++;

  document.getElementById("stars").innerText = `⭐ ${stars}`;

  showStar();

  i++;

  if(i % 3 === 0){
    level++;
    document.getElementById("level").innerText = `Level ${level}`;
    showBalloons();
  }

  if(i >= letters.length){
    i=0;
  }

  render();

}

function showStar(){

  const s = document.getElementById("starPopup");

  s.innerText = "⭐ " + stars;

  s.classList.remove("starAnim");
  void s.offsetWidth;
  s.classList.add("starAnim");

}

function showBalloons(){

  for(let b=0;b<6;b++){

    let el=document.createElement("div");
    el.className="balloon";
    el.innerText="🎈";
    el.style.left=Math.random()*100+"vw";

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),5000);

  }

}

window.onload = render;

</script>

</body>
</html>
