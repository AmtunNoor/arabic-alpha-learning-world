<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha Learning World</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family:Arial;
  touch-action:manipulation;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.2s ease;
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 16px;
  font-size:20px;
  font-weight:bold;
  z-index:10;
}

/* APP */
#app{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;
}

/* LETTER */
#letter{
  font-size:150px;
  padding:25px 50px;
  background:rgba(255,255,255,.12);
  border-radius:25px;
}

/* ACTION */
#action{font-size:110px}

/* PHRASE */
#phrase{
  font-size:28px;
  color:#ffe08a;
  min-height:40px;
}

/* CONTROLS */
#controls{
  position:fixed;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  z-index:20;
}

button,select{
  padding:10px 14px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  background:white;
  color:black;
}

/* ACTION ANIMS (RESTORED) */
.clap{animation:clap .7s infinite}
.jump{animation:jump .7s infinite}
.spin{animation:spin 1s linear infinite}
.run{animation:run .6s infinite alternate}
.walk{animation:walk .8s infinite alternate}
.wave{animation:wave 1s infinite}

@keyframes clap{50%{transform:scale(1.3)}}
@keyframes jump{50%{transform:translateY(-35px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes run{to{transform:translateX(20px)}}
@keyframes walk{to{transform:translateX(10px)}}
@keyframes wave{50%{transform:rotate(15deg)}}

</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div id="hud">
  <div id="level">Level 1</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="app">
  <div id="letter">ا</div>
  <div id="action">👏</div>
  <div id="phrase"></div>
</div>

<div id="controls">
  <select id="speed">
    <option value="1200">FAST</option>
    <option value="2500" selected>NORMAL</option>
    <option value="4500">SLOW</option>
  </select>

  <select id="mode">
    <option value="auto">AUTO</option>
    <option value="manual">MANUAL</option>
  </select>

  <select id="order">
    <option value="seq">SEQUENCE</option>
    <option value="rand">RANDOM</option>
  </select>

  <button onclick="next()">NEXT</button>
  <button onclick="togglePause()">PAUSE</button>
</div>

<script>

/* CORE STATE */
let i=0;
let stars=0;
let level=1;
let speed=2500;
let auto=true;
let rand=false;
let paused=false;

/* AUDIO */
const L=new Audio();
const A=new Audio();
const P=new Audio();

const ambient=new Audio("assets/sounds/system/ambient.mp3");
ambient.loop=true;
ambient.volume=.08;

const star=new Audio("assets/sounds/system/star.mp3");
star.volume=.2;

/* DATA (UNCHANGED CORE STYLE) */
const letters=["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص"];

const actions=[
{icon:"👏",name:"clap",audio:"assets/sounds/actions/clap.mp3"},
{icon:"🦋",name:"wave",audio:"assets/sounds/actions/wave.mp3"},
{icon:"🏃",name:"run",audio:"assets/sounds/actions/run.mp3"},
{icon:"🚶",name:"walk",audio:"assets/sounds/actions/walk.mp3"},
{icon:"🌀",name:"spin",audio:"assets/sounds/actions/spin.mp3"}
];

const praise=[
"assets/sounds/phrases/amazing.mp3",
"assets/sounds/phrases/well-done.mp3"
];

/* ACTION FIX (NO REPETITION) */
let last=-1;

/* STEP ENGINE */
async function step(){

  if(paused) return;

  const Ltr=letters[i%letters.length];

  let idx;
  do{
    idx=Math.floor(Math.random()*actions.length);
  }while(idx===last);

  last=idx;
  const Act=actions[idx];

  letter.innerText=Ltr;

  action.innerText=Act.icon;
  action.className="";
  void action.offsetWidth;
  action.classList.add(Act.name);

  L.pause(); A.pause(); P.pause();

  L.src=`assets/sounds/letters/${Ltr}.mp3`;
  A.src=Act.audio;
  P.src=praise[Math.floor(Math.random()*praise.length)];

  L.play().catch(()=>{});

  L.onended=()=>{
    A.play().catch(()=>{});
    A.onended=()=>{
      P.play().catch(()=>{});
    };
  };

  starPlay();

  i++;
  if(i%5===0) level++;

}

/* STAR */
function starPlay(){
  stars++;
  document.getElementById("stars").innerText="⭐ "+stars;
  star.currentTime=0;
  star.play().catch(()=>{});
}

/* NEXT */
function next(){ step(); }

/* LOOP */
let loop;
function start(){
  clearInterval(loop);
  loop=setInterval(()=>{
    if(auto && !paused) step();
  },speed);
}

/* SPEED */
speed.onchange=function(){
  speed=+this.value;
  start();
};

mode.onchange=function(){
  auto=this.value==="auto";
};

order.onchange=function(){
  rand=this.value==="rand";
};

/* PAUSE FIX */
function togglePause(){
  paused=!paused;
  if(paused){
    clearInterval(loop);
    ambient.pause();
  }else{
    ambient.play().catch(()=>{});
    start();
  }
}

/* START SAFE */
window.onload=()=>{
  ambient.play().catch(()=>{});
  step();
  start();
};

</script>

</body>
</html>
