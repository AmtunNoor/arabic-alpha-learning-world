<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha Learning World</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#05060a;
  font-family:Arial, sans-serif;
}

/* ================= SCENES ================= */
.scene{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:opacity 1.2s ease;
  color:white;
}

.scene.active{ opacity:1; }

/* ================= BRAND INTRO ================= */
#intro{
  flex-direction:column;
  background:radial-gradient(circle at center, #0b0f1a, #05060a 70%);
}

.nameBig{
  font-size:64px;
  font-weight:900;
  letter-spacing:12px;
  color:#e6f0ff;
  text-shadow:0 0 30px rgba(120,180,255,0.35);
  animation:fadeIn 3.5s ease-in-out;
}

.smallTag{
  margin-top:12px;
  font-size:16px;
  color:#7aa7ff;
  letter-spacing:6px;
  animation:fadeIn 3.5s ease-in-out;
}

@keyframes fadeIn{
  0%{opacity:0; transform:scale(1.2);}
  40%{opacity:1; transform:scale(1);}
  100%{opacity:0; transform:scale(0.98);}
}

/* ================= DEDICATION (KID BUBBLE STYLE) ================= */
#dedication{
  flex-direction:column;
  background:#05060a;
}

.bubbleText{
  font-size:40px;
  font-weight:700;
  color:#fff;
  padding:20px 30px;
  border-radius:40px;
  background:linear-gradient(135deg,#ff9ad5,#7ad7ff);
  box-shadow:0 0 25px rgba(255,255,255,0.2);
  animation:bounce 2s ease-in-out infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* ================= GAME ================= */
#game{
  flex-direction:column;
  color:white;
}
</style>
</head>

<body>

<!-- ================= INTRO ================= -->
<div id="intro" class="scene active">
  <div class="nameBig">AMTUN NOOR</div>
  <div class="smallTag">CREATED BY AMTUN NOOR</div>
</div>

<!-- ================= DEDICATION ================= -->
<div id="dedication" class="scene">
  <div class="bubbleText">For Mariam & Hamza</div>
</div>

<!-- ================= GAME ================= -->
<div id="game" class="scene"></div>

<script>

/* ================= SAFE SPEED ENGINE ================= */
const Speed = {
  m: 1,
  set(mode){
    this.m = mode==="fast"?1.8:mode==="slow"?0.6:1;
  },
  t(ms){ return ms/this.m; }
};

const delay = ms => new Promise(r => setTimeout(r, Speed.t(ms)));

/* ================= SCENE CONTROL (NO DEAD END) ================= */
function show(id){
  return new Promise(res=>{
    document.querySelectorAll(".scene")
      .forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    setTimeout(res,50);
  });
}

/* ================= THEME SAFE LOAD ================= */
function loadTheme(){
  const img = new Image();
  img.src = "images/themes/default.webp";
}

/* ================= GAME START (FORCED SAFE ENTRY) ================= */
function startGame(){
  const g = document.getElementById("game");

  // IMPORTANT: your real game must attach here
  g.innerHTML = "<div style='text-align:center'>GAME LOADED</div>";

  console.log("GAME STARTED SUCCESSFULLY");
}

/* ================= BOOT SEQUENCE ================= */
async function boot(){
  try{

    await show("intro");
    await delay(3800);

    await show("dedication");
    await delay(3200);

    loadTheme();

    await show("game");

    // 🔥 THIS WAS MISSING IN YOUR SYSTEM BEFORE
    startGame();

  }catch(e){
    console.error("BOOT FAILED",e);
    document.body.innerHTML =
      "<div style='color:white;background:black;height:100vh;display:flex;align-items:center;justify-content:center;'>Recovery Mode</div>";
  }
}

boot();

</script>

</body>
</html>
