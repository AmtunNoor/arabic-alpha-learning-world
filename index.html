<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Arabic Alpha Learning World V7 - Locked Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:Fredoka,sans-serif;
  color:#fff;
}

#app{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;
  padding-bottom:180px;
  text-align:center;
}

/* TV MODE */
@media(min-width:1200px){
  #letter{font-size:240px}
  #action{font-size:140px}
  #phrase{font-size:40px}
}

/* BACKGROUNDS */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1s ease;
  z-index:-10;
}
#bg2{opacity:0}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:-9;
}

/* MAIN UI */
#letter{
  font-size:150px;
  padding:20px 40px;
  background:rgba(255,255,255,.1);
  border-radius:24px;
}

#action{
  font-size:110px;
}

#phrase{
  min-height:50px;
  font-size:28px;
  color:#ffd86b;
}

/* CONTROLS */
#controls{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<div id="app">
  <div id="letter">ا</div>
  <div id="action">👋</div>
  <div id="phrase"></div>
</div>

<div id="controls">
  <button onclick="next()">NEXT</button>
</div>

<script>

/* ===================== LETTERS ===================== */
const letters = [
"ا","ب","ت","ث","ج","ح","خ","د","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","ه","و","ي"
];

/* ===================== ALL ACTIONS FROM YOUR REPO ===================== */
const actions = [
{ name:"clap", icon:"👏", sound:"clap.mp3", anim:"clap" },
{ name:"fly", icon:"🪶", sound:"fly.mp3", anim:"fly" },
{ name:"hop", icon:"🐸", sound:"hop.mp3", anim:"hop" },
{ name:"jump", icon:"🦘", sound:"jump.mp3", anim:"jump" },
{ name:"look", icon:"👀", sound:"look.mp3", anim:"look" },
{ name:"quiet", icon:"🤫", sound:"quiet.mp3", anim:"quiet" },
{ name:"run", icon:"🏃", sound:"run.mp3", anim:"run" },
{ name:"sit", icon:"🪑", sound:"sit.mp3", anim:"sit" },
{ name:"sleep", icon:"😴", sound:"sleep.mp3", anim:"sleep" },
{ name:"spin", icon:"🌀", sound:"spin.mp3", anim:"spin" },
{ name:"stomp", icon:"👣", sound:"stomp.mp3", anim:"stomp" },
{ name:"stretch", icon:"🤸", sound:"stretch.mp3", anim:"stretch" },
{ name:"strong", icon:"💪", sound:"strong.mp3", anim:"strong" },
{ name:"walk", icon:"🚶", sound:"walk.mp3", anim:"walk" },
{ name:"wave", icon:"👋", sound:"wave.mp3", anim:"wave" }
];

/* ===================== THEMES ===================== */
const themes = [
"snow","snow_2",
"garden",
"ocean","ocean_2",
"forest","forest_2",
"rainbow","rainbow_2",
"balloon"
].map(t=>`assets/images/themes/${t}.webp`);

/* preload */
themes.forEach(src=>{
  const i=new Image();
  i.src=src;
});

/* ===================== STATE ===================== */
let i=0;
let bgFlip=true;

/* ===================== DOM ===================== */
const el = {
  letter:document.getElementById("letter"),
  action:document.getElementById("action"),
  phrase:document.getElementById("phrase"),
  bg1:document.getElementById("bg1"),
  bg2:document.getElementById("bg2")
};

/* ===================== AUDIO ===================== */
const ambient=new Audio("assets/sounds/system/ambient.mp3");
ambient.loop=true;
ambient.volume=0.15;

/* unlock audio */
document.addEventListener("pointerdown",()=>{
  ambient.play().then(()=>ambient.pause()).catch(()=>{});
},{once:true});

/* ===================== ROTATION ENGINE (KEY FIX) ===================== */
/* Each LETTER gets its OWN action history pointer */
const letterActionMap = {};

/* init map */
letters.forEach(l=>{
  letterActionMap[l]=0;
});

function getActionForLetter(letter){
  const idx = letterActionMap[letter];
  const action = actions[idx % actions.length];
  letterActionMap[letter] = idx + 1; // rotate per letter usage
  return action;
}

/* ===================== STEP ===================== */
function step(){

  const letter = letters[i % letters.length];

  /* ACTION ROTATION PER LETTER (FIXED) */
  const action = getActionForLetter(letter);

  /* UI */
  el.letter.textContent = letter;
  el.action.textContent = action.icon;
  el.phrase.textContent = action.name.toUpperCase();

  /* SOUND */
  const audio = new Audio(`assets/sounds/actions/${action.sound}`);
  audio.volume = 0.8;
  audio.play().catch(()=>{});

  /* AMBIENT MIX */
  ambient.volume = 0.12;
  ambient.play().catch(()=>{});

  /* THEME ROTATION */
  const bg = themes[i % themes.length];

  const next = bgFlip ? el.bg2 : el.bg1;
  const old = bgFlip ? el.bg1 : el.bg2;

  next.style.backgroundImage=`url('${bg}')`;
  next.style.opacity=1;
  old.style.opacity=0;

  bgFlip = !bgFlip;

  i++;
}

/* ===================== NEXT ===================== */
function next(){
  step();
}

/* ===================== START ===================== */
window.addEventListener("load",()=>{
  setTimeout(step,1200);
});

document.body.addEventListener("click",step,{once:true});

</script>

</body>
</html>
