<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arabic Learning World Engine</title>

<style>

body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
  color:white;
}

/* ===== BACKGROUND ENGINE (DUAL IMAGE) ===== */
#bg1,#bg2{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.2s ease;
  z-index:-2;
}

#bg2{z-index:-1; opacity:0;}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

#app{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;
}

/* LETTER */
#letter{
  font-size:150px;
  padding:30px 60px;
  background:rgba(255,255,255,0.15);
  border-radius:30px;
}

/* ACTION VISUAL */
#action{
  font-size:120px;
  transition:transform 0.3s ease;
}

/* PHRASE */
#phrase{
  font-size:28px;
  color:#ffe08a;
}

/* HUD */
#hud{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  font-size:22px;
}

/* STAR POPUP */
#starPopup{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:120px;
  opacity:0;
}

.starAnim{
  animation:pop 0.9s ease;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;}
  50%{transform:translate(-50%,-50%) scale(1.4);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(0);opacity:0;}
}

/* BALLOON */
.balloon{
  position:absolute;
  bottom:-100px;
  font-size:50px;
  animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
  to{transform:translateY(-120vh);opacity:0;}
}

</style>
</head>

<body>

<div id="bg1"></div>
<div id="bg2"></div>
<div class="overlay"></div>

<div id="hud">
  <div id="level">Level 1 ❄️</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="starPopup">⭐</div>

<div id="app">

  <div id="letter">ا</div>

  <div id="action">👋</div>

  <div id="phrase">Listen and watch</div>

</div>

<script>

/* ===================== LETTERS ===================== */
const letters = [
  {a:"ا", audio:"assets/sounds/letters/alif.mp3"},
  {a:"ب", audio:"assets/sounds/letters/ba.mp3"},
  {a:"ت", audio:"assets/sounds/letters/ta.mp3"}
];

/* ===================== ACTIONS ===================== */
const actions = [
  {
    icon:"👏",
    name:"clap",
    text:"Clap your hands!",
    audio:"assets/sounds/actions/clap.mp3"
  },
  {
    icon:"🦘",
    name:"jump",
    text:"Jump fast!",
    audio:"assets/sounds/actions/jump.mp3"
  },
  {
    icon:"🌀",
    name:"spin",
    text:"Spin around!",
    audio:"assets/sounds/actions/spin.mp3"
  }
];

/* ===================== PHRASES ===================== */
const phrases = [
  "Great job!",
  "Amazing!",
  "Well done!",
  "Fantastic!",
  "You did it!"
];

/* ===================== THEMES (DUAL IMAGES) ===================== */
const themes = [
  ["assets/images/themes/snow.webp","assets/images/themes/snow_2.webp"],
  ["assets/images/themes/garden.webp","assets/images/themes/garden_2.webp"],
  ["assets/images/themes/ocean.webp","assets/images/themes/ocean_2.webp"],
  ["assets/images/themes/rainbow.webp","assets/images/themes/rainbow_2.webp"]
];

/* ===================== STATE ===================== */
let i=0;
let stars=0;
let level=1;
let toggle=true;

const letterAudio = new Audio();
const actionAudio = new Audio();

/* ===================== PRELOAD ===================== */
function preload(){
  themes.flat().forEach(src=>{
    const img=new Image();
    img.src=src;
  });
}
preload();

/* ===================== THEME ENGINE ===================== */
function setTheme(){

  const set = themes[level-1] || themes[0];

  const next = toggle ? document.getElementById("bg2") : document.getElementById("bg1");
  const curr = toggle ? document.getElementById("bg1") : document.getElementById("bg2");

  next.style.backgroundImage = `url('${set[i % 2]}')`;
  next.style.opacity = 1;
  curr.style.opacity = 0;

  toggle = !toggle;
}

/* ===================== STAR ===================== */
function showStar(){

  stars++;

  document.getElementById("stars").innerText = `⭐ ${stars}`;

  const s = document.getElementById("starPopup");

  s.innerText = "⭐ " + stars;

  s.classList.remove("starAnim");
  void s.offsetWidth;
  s.classList.add("starAnim");
}

/* ===================== BALLOONS ===================== */
function balloons(){

  for(let b=0;b<6;b++){
    const el=document.createElement("div");
    el.className="balloon";
    el.innerText="🎈";
    el.style.left=Math.random()*100+"vw";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}

/* ===================== MAIN ENGINE ===================== */
function run(){

  const L = letters[i];
  const A = actions[Math.floor(Math.random()*actions.length)];

  /* LETTER */
  document.getElementById("letter").innerText = L.a;
  letterAudio.src = L.audio;
  letterAudio.play().catch(()=>{});

  /* ACTION */
  const act = document.getElementById("action");
  act.innerText = A.icon;
  act.className = A.name;

  /* PHRASE */
  document.getElementById("phrase").innerText = A.text;

  /* ACTION AUDIO */
  setTimeout(()=>{
    actionAudio.src = A.audio;
    actionAudio.play().catch(()=>{});
  },700);

  /* THEME */
  setTheme();

}

/* ===================== NEXT ===================== */
function next(){

  showStar();

  i++;

  if(i % 2 === 0){
    level++;
    document.getElementById("level").innerText = `Level ${level}`;
    balloons();
  }

  if(i >= letters.length) i=0;

  run();

}

window.onload = run;

</script>

</body>
</html>
