<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arabic Learning World - Final Engine</title>

<style>

body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
  color:white;
}

/* ===== BACKGROUND (DUAL LAYER) ===== */
#bg1,#bg2{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.5s ease;
  z-index:-3;
}

#bg2{opacity:0;}

/* ===== PARTICLE CANVAS ===== */
#fx{
  position:fixed;
  inset:0;
  z-index:-2;
  pointer-events:none;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.25);
  z-index:-1;
}

/* APP */
#app{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;
}

/* LETTER */
#letter{
  font-size:160px;
  padding:30px 60px;
  background:rgba(255,255,255,0.15);
  border-radius:30px;
}

/* ACTION */
#action{
  font-size:130px;
}

/* PHRASE */
#phrase{
  font-size:28px;
  color:#ffe08a;
}

/* HUD */
#hud{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  font-size:22px;
}

/* STAR */
#starPopup{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:140px;
  opacity:0;
  text-align:center;
}

#starPopup span{
  display:block;
  font-size:32px;
}

.starAnim{
  animation:pop 1s ease;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);}
  50%{transform:translate(-50%,-50%) scale(1.5);}
  100%{transform:translate(-50%,-50%) scale(0);}
}

/* BALLOON */
.balloon{
  position:absolute;
  bottom:-100px;
  font-size:50px;
  animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
  to{transform:translateY(-120vh);opacity:0;}
}

/* ACTION ANIMATIONS */
.clap{animation:clap 0.7s infinite;}
.jump{animation:jump 0.7s infinite;}
.spin{animation:spin 1s linear infinite;}

@keyframes clap{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.3);}
}

@keyframes jump{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-50px);}
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div id="bg1"></div>
<div id="bg2"></div>

<canvas id="fx"></canvas>

<div class="overlay"></div>

<div id="hud">
  <div id="level">Level 1 ❄️</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="starPopup">⭐<span>0</span></div>

<div id="app">
  <div id="letter">ا</div>
  <div id="action">👋</div>
  <div id="phrase"></div>
</div>

<script>

/* ================= LETTERS ================= */
const letters = [
  {a:"ا", audio:"assets/sounds/letters/alif.mp3"},
  {a:"ب", audio:"assets/sounds/letters/ba.mp3"},
  {a:"ت", audio:"assets/sounds/letters/ta.mp3"}
];

/* ================= ACTIONS ================= */
const actions = [
  {icon:"👏", name:"clap", text:"Clap!", audio:"assets/sounds/actions/clap.mp3"},
  {icon:"🦘", name:"jump", text:"Jump!", audio:"assets/sounds/actions/jump.mp3"},
  {icon:"🌀", name:"spin", text:"Spin!", audio:"assets/sounds/actions/spin.mp3"}
];

/* ================= THEMES ================= */
const themes = [
  ["assets/images/themes/snow.webp","assets/images/themes/snow_2.webp"],
  ["assets/images/themes/garden.webp","assets/images/themes/garden_2.webp"],
  ["assets/images/themes/ocean.webp","assets/images/themes/ocean_2.webp"],
  ["assets/images/themes/rainbow.webp","assets/images/themes/rainbow_2.webp"]
];

/* ================= STATE ================= */
let i=0;
let stars=0;
let level=1;
let toggle=true;

const letterAudio=new Audio();
const actionAudio=new Audio();

/* ================= PRELOAD ================= */
themes.flat().forEach(src=>{
  const img=new Image();
  img.src=src;
});

/* ================= PARTICLES ================= */
const canvas=document.getElementById("fx");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function setParticles(type){

  particles=[];

  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*3+1,
      d:Math.random()*1+0.5,
      type:type
    });
  }
}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{

    if(p.type==="snow"){
      p.y+=p.d;
      if(p.y>canvas.height)p.y=0;
      ctx.fillStyle="white";
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
    }

    if(p.type==="ocean"){
      p.x+=Math.sin(p.y/40);
      p.y+=0.5;
      if(p.y>canvas.height)p.y=0;
      ctx.fillRect(p.x,p.y,p.r,p.r);
    }

    if(p.type==="garden"){
      p.y+=p.d;
      p.x+=Math.sin(p.y/30);
      if(p.y>canvas.height)p.y=0;
      ctx.fillRect(p.x,p.y,p.r,p.r);
    }

    if(p.type==="rainbow"){
      p.y+=1.2;
      p.x+=Math.sin(p.y/10)*2;
      if(p.y>canvas.height)p.y=0;
      ctx.fillRect(p.x,p.y,p.r,p.r);
    }

  });

  requestAnimationFrame(draw);
}
draw();

/* ================= THEME ================= */
let worldToggle=true;

function setTheme(){

  const set=themes[level-1]||themes[0];

  const next=worldToggle?bg2:bg1;
  const curr=worldToggle?bg1:bg2;

  next.style.backgroundImage=`url('${set[i%2]}')`;
  next.style.opacity=1;
  curr.style.opacity=0;

  worldToggle=!worldToggle;

  const map=["snow","garden","ocean","rainbow"];
  setParticles(map[level-1]||"snow");

}

/* ================= STAR ================= */
function showStar(){

  stars++;

  document.getElementById("stars").innerText=`⭐ ${stars}`;

  const s=document.getElementById("starPopup");
  s.innerHTML=`⭐<span>${stars}</span>`;

  s.classList.remove("starAnim");
  void s.offsetWidth;
  s.classList.add("starAnim");

}

/* ================= BALLOONS ================= */
function balloons(){

  for(let b=0;b<6;b++){
    const el=document.createElement("div");
    el.className="balloon";
    el.innerText="🎈";
    el.style.left=Math.random()*100+"vw";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }

}

/* ================= CORE LOOP ================= */
function step(){

  const L=letters[i];
  const A=actions[Math.floor(Math.random()*actions.length)];

  document.getElementById("letter").innerText=L.a;

  letterAudio.src=L.audio;
  letterAudio.play().catch(()=>{});

  const act=document.getElementById("action");
  act.innerText=A.icon;
  act.className="";
  void act.offsetWidth;
  act.className=A.name;

  document.getElementById("phrase").innerText=A.text;

  setTimeout(()=>{
    actionAudio.src=A.audio;
    actionAudio.play().catch(()=>{});
  },700);

  setTheme();

}

/* ================= NEXT ================= */
function next(){

  showStar();

  i++;

  if(i%2===0){
    level++;
    document.getElementById("level").innerText=`Level ${level}`;
    balloons();
  }

  if(i>=letters.length)i=0;

  step();

}

/* ================= AUTO RUN ================= */
window.onload=()=>{

  step();

  setInterval(next,4000);

};

</script>

</body>
</html>
