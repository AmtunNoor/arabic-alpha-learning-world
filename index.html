<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha World</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Baloo 2','Fredoka',cursive;
  background:#000;
  color:#fff;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.5s ease;
  opacity:0;
  z-index:-10;
}
#bg1{opacity:1;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:-9;}

/* PARTICLES */
#particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-8;
}
.floatObj{
  position:absolute;
  animation:float 8s linear infinite;
}
@keyframes float{
  from{transform:translateY(-10vh);}
  to{transform:translateY(120vh);}
}

/* INTRO SYSTEM */
.intro{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:9999;
  transition:opacity 1s ease;
}

.introBox1{
  font-size:70px;
  padding:25px 40px;
  border-radius:40px;
  background:linear-gradient(135deg,#ff4d4d,#ffd700,#4dd0ff);
  animation:pop 2s infinite alternate;
}

.introBox2{
  font-size:55px;
  margin-top:20px;
  padding:20px 35px;
  border-radius:40px;
  background:linear-gradient(135deg,#7cfc00,#ff69b4,#ffa500);
  animation:pop 2.5s infinite alternate;
}

@keyframes pop{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

/* GAME UI */
#hud{
  position:fixed;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  z-index:100;
}

#letter{
  font-size:160px;
  padding:25px 50px;
  background:rgba(255,255,255,.12);
  border-radius:30px;
}

#action{font-size:120px;}
#phrase{font-size:32px;color:#ffe082;}

#star{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:200px;
}
.starPop{animation:star 1s ease;}
@keyframes star{
  0%{transform:translate(-50%,-50%) scale(0);}
  50%{transform:translate(-50%,-50%) scale(1.5);}
  100%{transform:translate(-50%,-50%) scale(0);}
}

/* CONTROLS */
#controls{
  position:fixed;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

/* BUTTONS */
button,select{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- BACKGROUNDS -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- PARTICLES -->
<div id="particles"></div>

<!-- INTRO (PROPER 2 SCREEN FLOW) -->
<div id="intro1" class="intro">
  <div class="introBox1">✨ Created by Amtun Noor</div>
</div>

<div id="intro2" class="intro" style="opacity:0; display:none;">
  <div class="introBox2">💖 For Mariam & Hamza</div>
</div>

<!-- GAME -->
<div id="hud">
  <div id="level">Level 1</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="star">⭐</div>

<div id="letter">ا</div>
<div id="action">👏</div>
<div id="phrase">Loading...</div>

<div id="controls">
<button onclick="start()">START</button>
</div>

<script>

/* SAFE INIT */
let started=false;
let i=0;
let stars=0;
let level=1;

/* THEMES (MATCH YOUR REPO) */
const themes=[
["assets/images/themes/snow.webp","❄️"],
["assets/images/themes/ocean.webp","🌊"],
["assets/images/themes/garden.webp","🌸"],
["assets/images/themes/forest.webp","🌲"],
["assets/images/themes/rainbow.webp","🌈"]
];

/* INIT BACKGROUND */
function setTheme(){
  const t=themes[level%themes.length];

  const bg=bg1.style.opacity==1?bg2:bg1;
  const old=bg1.style.opacity==1?bg1:bg2;

  bg.style.backgroundImage=`url(${t[0]})`;
  bg.style.opacity=1;
  old.style.opacity=0;

  const p=document.getElementById("particles");
  p.innerHTML="";

  for(let j=0;j<15;j++){
    let d=document.createElement("div");
    d.className="floatObj";
    d.innerText=t[1];
    d.style.left=Math.random()*100+"%";
    d.style.fontSize="30px";
    d.style.animationDuration=5+Math.random()*5+"s";
    p.appendChild(d);
  }
}

/* STAR */
function showStar(){
  const s=document.getElementById("star");
  s.classList.add("starPop");
  stars++;
  document.getElementById("stars").innerText="⭐ "+stars;
  setTimeout(()=>s.classList.remove("starPop"),1000);
}

/* GAME LOOP */
async function loop(){

  if(!started) return;

  setTheme();

  document.getElementById("letter").innerText="ا";
  document.getElementById("action").innerText="👏";
  document.getElementById("phrase").innerText="Great Job!";

  await new Promise(r=>setTimeout(r,1500));

  showStar();

  i++;
  if(i%5==0){
    level++;
    document.getElementById("level").innerText="Level "+level;
  }

  setTimeout(loop,2000);
}

/* INTRO FLOW */
async function start(){

  document.getElementById("intro1").style.opacity=0;

  setTimeout(()=>{
    document.getElementById("intro1").style.display="none";
    document.getElementById("intro2").style.display="flex";
    document.getElementById("intro2").style.opacity=1;
  },1200);

  setTimeout(()=>{
    document.getElementById("intro2").style.opacity=0;
  },3000);

  setTimeout(()=>{
    document.getElementById("intro2").style.display="none";
    started=true;
    loop();
  },4200);
}

window.onload=()=>{};

</script>

</body>
</html>
