
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha Learning World</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family:'Fredoka',sans-serif;

  touch-action:manipulation;
  overscroll-behavior:none;
}

/* BACKGROUNDS */
.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity 1.5s ease;
  z-index:-7;
}
#bg2{opacity:0}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.2);
  z-index:-6;
}

/* WORLD */
#world{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:-5;
}

.obj{
  position:absolute;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
}

/* ANIMS */
.snowAnim{animation:snowFall linear infinite}
@keyframes snowFall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(120vh)}
}

.gardenAnim{animation:gardenFloat linear infinite}
@keyframes gardenFloat{
  from{transform:translateY(110vh)}
  to{transform:translateY(-20vh)}
}

.oceanAnim{animation:oceanMove linear infinite}
@keyframes oceanMove{
  from{transform:translateX(-20vw)}
  to{transform:translateX(120vw)}
}

.forestAnim{animation:forestDrift linear infinite}
@keyframes forestDrift{
  from{transform:translateY(-10vh)}
  to{transform:translateY(120vh)}
}

/* HUD */
#hud{
  position:fixed;
  top:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 18px;
  z-index:50;
  font-size:20px;
  font-weight:bold;
}

/* APP */
#app{
  min-height:100vh;
  width:100vw;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:20px;
}

/* LETTER */
#letter{
  font-size:155px;
  background:rgba(255,255,255,.13);
  padding:25px 55px;
  border-radius:30px;
  backdrop-filter:blur(6px);
}

/* ACTION */
#action{font-size:110px}

/* PHRASE */
#phrase{
  min-height:40px;
  font-size:30px;
  font-weight:bold;
  color:#ffe28a;
}

/* CONTROLS */
#controls{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button,select{
  border:none;
  border-radius:16px;
  padding:12px 16px;
  font-size:14px;
  font-weight:800;
  color:white;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(8px);
  cursor:pointer;
}

select option{
  background:#111;
  color:white;
}

/* STAR */
#starWrap{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:180px;
  opacity:0;
  z-index:999;
}

.starPop{animation:starPop .8s ease}

@keyframes starPop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  50%{transform:translate(-50%,-50%) scale(1.4);opacity:1}
  100%{transform:translate(-50%,-50%) scale(0);opacity:0}
}

/* ACTION FIX */
.clap{animation:clapAnim .7s infinite}
.jump{animation:jumpAnim .7s infinite}
.spin{animation:spinAnim 1s linear infinite}
.fly{animation:flyAnim 1s infinite alternate}
.run{animation:runAnim .5s infinite alternate}
.walk{animation:walkAnim 1s infinite alternate}
.wave{animation:waveAnim 1s infinite}

@keyframes clapAnim{50%{transform:scale(1.3)}}
@keyframes jumpAnim{50%{transform:translateY(-40px)}}
@keyframes spinAnim{to{transform:rotate(360deg)}}
@keyframes flyAnim{to{transform:translateX(20px)}}
@keyframes runAnim{to{transform:translateX(20px)}}
@keyframes walkAnim{to{transform:translateX(10px)}}
@keyframes waveAnim{50%{transform:rotate(15deg)}}

/* MOBILE */
@media(max-width:768px){
  #letter{font-size:100px}
  #action{font-size:80px}
}

</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<div id="world"></div>

<div id="hud">
  <div id="level">Level 1</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="starWrap">⭐</div>

<div id="app">
  <div id="letter">ا</div>
  <div id="action">👏</div>
  <div id="phrase"></div>
</div>

<div id="controls">
  <select id="speedSelect">
    <option value="1200">FAST</option>
    <option value="2500" selected>NORMAL</option>
    <option value="4500">SLOW</option>
  </select>

  <select id="modeSelect">
    <option value="auto">AUTO</option>
    <option value="manual">MANUAL</option>
  </select>

  <select id="orderSelect">
    <option value="sequence">SEQUENCE</option>
    <option value="random">RANDOM</option>
  </select>

  <button onclick="next()">NEXT</button>
  <button onclick="togglePause()">PAUSE</button>
</div>

<script>

/* CORE STATE */
let current=0;
let stars=0;
let level=1;
let paused=false;
let autoMode=true;
let randomMode=false;
let speed=2500;
let started=false;

/* AUDIO */
const laudio=new Audio();
const aaudio=new Audio();
const praiseAudio=new Audio();

const ambient=new Audio("assets/sounds/system/ambient.mp3");
ambient.loop=true;
ambient.volume=.08;

const starSound=new Audio("assets/sounds/system/star.mp3");
starSound.volume=.25;

/* DATA */
const letters=["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص"];
const actions=[
  {icon:"👏",name:"clap",audio:"assets/sounds/actions/clap.mp3"},
  {icon:"🦋",name:"fly",audio:"assets/sounds/actions/fly.mp3"},
  {icon:"🏃",name:"run",audio:"assets/sounds/actions/run.mp3"},
  {icon:"🚶",name:"walk",audio:"assets/sounds/actions/walk.mp3"},
  {icon:"🌀",name:"spin",audio:"assets/sounds/actions/spin.mp3"},
  {icon:"🙌",name:"wave",audio:"assets/sounds/actions/wave.mp3"}
];

/* ACTION ROTATION FIX */
let lastAction=-1;

/* STEP */
function step(){

  if(paused) return;

  const L=letters[current%letters.length];

  let AIndex;
  do{
    AIndex=Math.floor(Math.random()*actions.length);
  }while(AIndex===lastAction);

  lastAction=AIndex;
  const A=actions[AIndex];

  letter.innerText=L;
  action.innerText=A.icon;

  action.className="";
  void action.offsetWidth;
  action.classList.add(A.name);

  /* AUDIO SAFE QUEUE */
  laudio.pause(); aaudio.pause(); praiseAudio.pause();

  laudio.src=`assets/sounds/letters/${L}.mp3`;
  aaudio.src=A.audio;
  praiseAudio.src="assets/sounds/phrases/amazing.mp3";

  laudio.play().catch(()=>{});

  laudio.onended=()=>{
    aaudio.play().catch(()=>{});

    aaudio.onended=()=>{
      praiseAudio.play().catch(()=>{});
    };
  };

  current++;
  showStar();
}

/* STAR */
function showStar(){
  stars++;
  starsText.innerText="⭐ "+stars;

  starWrap.classList.remove("starPop");
  void starWrap.offsetWidth;
  starWrap.classList.add("starPop");

  starSound.currentTime=0;
  starSound.play().catch(()=>{});
}

/* PAUSE FIX */
function togglePause(){

  paused=!paused;

  if(paused){
    clearInterval(window.loop);
    ambient.pause();
  }else{
    ambient.play().catch(()=>{});
    restartLoop();
  }
}

/* LOOP */
function restartLoop(){
  clearInterval(window.loop);
  window.loop=setInterval(()=>{
    if(autoMode && !paused) step();
  },speed);
}

/* SPEED */
speedSelect.onchange=function(){
  speed=+this.value;
  restartLoop();
};

modeSelect.onchange=function(){
  autoMode=this.value==="auto";
};

orderSelect.onchange=function(){
  randomMode=this.value==="random";
};

/* START */
window.onload=()=>{
  ambient.play().catch(()=>{});
  step();
  restartLoop();
};

</script>

</body>
</html>
