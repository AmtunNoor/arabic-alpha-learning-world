<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arabic Alpha Learning World</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:black;
  color:white;
}

/* BACKGROUNDS */

.bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 1.5s ease;
  z-index:-10;
  transform:scale(1.05);
}

#bg1{
  opacity:1;
}

/* DARK OVERLAY */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.18);
  z-index:-9;
}

/* PARTICLES */

#particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-8;
  pointer-events:none;
}

/* MAIN */

#app{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:20px;
  padding:20px;
}

/* HUD */

#hud{
  position:fixed;
  top:10px;
  left:0;
  width:100%;
  padding:0 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:50;
  font-size:22px;
  font-weight:bold;
}

/* LETTER */

#letter{
  font-size:160px;
  background:rgba(255,255,255,.14);
  padding:28px 55px;
  border-radius:30px;
  backdrop-filter:blur(4px);
  box-shadow:0 0 25px rgba(255,255,255,.2);
  min-width:220px;
}

/* ACTION */

#action{
  font-size:120px;
  will-change:transform;
}

/* PHRASE */

#phrase{
  font-size:30px;
  color:#ffe083;
  font-weight:bold;
  min-height:40px;
}

/* CONTROLS */

#controls{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  z-index:100;
}

select,button{
  border:none;
  border-radius:12px;
  padding:10px 14px;
  font-size:15px;
  font-weight:bold;
}

button{
  background:white;
  color:black;
}

/* STAR */

#starWrap{
  position:fixed;
  top:50%;
  left:50%;
  width:220px;
  height:220px;
  transform:translate(-50%,-50%) scale(0);
  z-index:200;
  opacity:0;
}

#starShape{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:220px;
}

#starCount{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:58px;
  color:black;
  font-weight:bold;
}

.starPop{
  animation:starPop 1s ease;
}

@keyframes starPop{

  0%{
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
  }

  50%{
    transform:translate(-50%,-50%) scale(1.4);
    opacity:1;
  }

  100%{
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
  }

}

/* BALLOONS */

.balloon{
  position:fixed;
  bottom:-120px;
  font-size:55px;
  animation:balloonUp 5s linear forwards;
  z-index:150;
}

@keyframes balloonUp{
  to{
    transform:translateY(-130vh);
    opacity:0;
  }
}

/* CONFETTI */

.confetti{
  position:fixed;
  width:14px;
  height:14px;
  animation:confettiFall 3s linear forwards;
  z-index:150;
}

@keyframes confettiFall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

/* PARTICLE OBJECTS */

.floatObj{
  position:absolute;
  opacity:.85;
  animation:floatDown linear infinite;
  user-select:none;
}

@keyframes floatDown{
  from{
    transform:translateY(-10vh) rotate(0deg);
  }
  to{
    transform:translateY(110vh) rotate(360deg);
  }
}

/* ACTION ANIMS */

.clap{animation:clap .7s infinite;}
.jump{animation:jump .7s infinite;}
.spin{animation:spin 1.1s linear infinite;}
.fly{animation:fly 1s infinite alternate;}
.hop{animation:hop .6s infinite;}
.look{animation:look 1s infinite alternate;}
.quiet{animation:quiet 2s infinite;}
.run{animation:run .5s infinite alternate;}
.sit{animation:sit 1.5s infinite;}
.sleep{animation:sleep 2s infinite;}
.stomp{animation:stomp .4s infinite;}
.stretch{animation:stretch 1s infinite alternate;}
.strong{animation:strong 1s infinite alternate;}
.walk{animation:walk 1s infinite alternate;}
.wave{animation:wave 1s infinite;}

@keyframes clap{50%{transform:scale(1.3);}}
@keyframes jump{50%{transform:translateY(-40px);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fly{to{transform:translateX(25px);}}
@keyframes hop{50%{transform:translateY(-25px);}}
@keyframes look{to{transform:translateX(10px);}}
@keyframes quiet{50%{opacity:.4;}}
@keyframes run{to{transform:translateX(18px);}}
@keyframes sit{50%{transform:translateY(10px);}}
@keyframes sleep{50%{opacity:.3;}}
@keyframes stomp{50%{transform:translateY(12px);}}
@keyframes stretch{to{transform:scaleY(1.2);}}
@keyframes strong{to{transform:scale(1.12);}}
@keyframes walk{to{transform:translateX(10px);}}
@keyframes wave{50%{transform:rotate(18deg);}}

/* MOBILE */

@media(max-width:768px){

  #letter{
    font-size:95px;
    padding:20px 35px;
    min-width:150px;
  }

  #action{
    font-size:85px;
  }

  #phrase{
    font-size:22px;
  }

  #hud{
    font-size:16px;
  }

  select,button{
    font-size:13px;
    padding:8px 10px;
  }

  #starWrap{
    width:150px;
    height:150px;
  }

  #starShape{
    font-size:150px;
  }

  #starCount{
    font-size:38px;
  }

}

</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="overlay"></div>

<div id="particles"></div>

<div id="hud">
  <div id="level">Level 1 ❄️</div>
  <div id="stars">⭐ 0</div>
</div>

<div id="starWrap">
  <div id="starShape">⭐</div>
  <div id="starCount">0</div>
</div>

<div id="app">

  <div id="letter">ا</div>

  <div id="action">👏</div>

  <div id="phrase"></div>

</div>

<div id="controls">

<select id="speedSelect" onchange="changeSpeed()">
  <option value="2500">FAST</option>
  <option value="4000" selected>NORMAL</option>
  <option value="6000">SLOW</option>
</select>

<select id="modeSelect" onchange="changeMode()">
  <option value="auto" selected>AUTO</option>
  <option value="manual">MANUAL</option>
</select>

<button onclick="next()">NEXT</button>

</div>

<script>

/* LETTERS */

const letters = [

{a:"ا",audio:"assets/sounds/letters/alif.mp3"},
{a:"ب",audio:"assets/sounds/letters/ba.mp3"},
{a:"ت",audio:"assets/sounds/letters/ta.mp3"},
{a:"ث",audio:"assets/sounds/letters/thaa.mp3"},
{a:"ج",audio:"assets/sounds/letters/jeem.mp3"},
{a:"ح",audio:"assets/sounds/letters/haa.mp3"},
{a:"خ",audio:"assets/sounds/letters/kha.mp3"},
{a:"د",audio:"assets/sounds/letters/daal.mp3"},
{a:"ذ",audio:"assets/sounds/letters/zaal.mp3"},
{a:"ر",audio:"assets/sounds/letters/raa.mp3"},
{a:"ز",audio:"assets/sounds/letters/zaa.mp3"},
{a:"س",audio:"assets/sounds/letters/seen.mp3"},
{a:"ش",audio:"assets/sounds/letters/sheen.mp3"},
{a:"ص",audio:"assets/sounds/letters/saad.mp3"},
{a:"ض",audio:"assets/sounds/letters/dad.mp3"},
{a:"ط",audio:"assets/sounds/letters/toa.mp3"},
{a:"ظ",audio:"assets/sounds/letters/zoa.mp3"},
{a:"ع",audio:"assets/sounds/letters/ain.mp3"},
{a:"غ",audio:"assets/sounds/letters/ghain.mp3"},
{a:"ف",audio:"assets/sounds/letters/fa.mp3"},
{a:"ق",audio:"assets/sounds/letters/kaaf.mp3"},
{a:"ك",audio:"assets/sounds/letters/laam.mp3"},
{a:"ل",audio:"assets/sounds/letters/laam.mp3"},
{a:"م",audio:"assets/sounds/letters/meem.mp3"},
{a:"ن",audio:"assets/sounds/letters/noon.mp3"},
{a:"ه",audio:"assets/sounds/letters/ha.mp3"},
{a:"و",audio:"assets/sounds/letters/waw.mp3"},
{a:"ي",audio:"assets/sounds/letters/yaa.mp3"}

];

/* ACTIONS */

const actions = [

{icon:"👏",name:"clap",audio:"assets/sounds/actions/clap.mp3"},
{icon:"✈️",name:"fly",audio:"assets/sounds/actions/fly.mp3"},
{icon:"🐸",name:"hop",audio:"assets/sounds/actions/hop.mp3"},
{icon:"🦘",name:"jump",audio:"assets/sounds/actions/jump.mp3"},
{icon:"👀",name:"look",audio:"assets/sounds/actions/look.mp3"},
{icon:"🤫",name:"quiet",audio:"assets/sounds/actions/quiet.mp3"},
{icon:"🏃",name:"run",audio:"assets/sounds/actions/run.mp3"},
{icon:"🧎",name:"sit",audio:"assets/sounds/actions/sit.mp3"},
{icon:"💤",name:"sleep",audio:"assets/sounds/actions/sleep.mp3"},
{icon:"🌀",name:"spin",audio:"assets/sounds/actions/spin.mp3"},
{icon:"🦶",name:"stomp",audio:"assets/sounds/actions/stomp.mp3"},
{icon:"🤸",name:"stretch",audio:"assets/sounds/actions/stretch.mp3"},
{icon:"💪",name:"strong",audio:"assets/sounds/actions/strong.mp3"},
{icon:"🚶",name:"walk",audio:"assets/sounds/actions/walk.mp3"},
{icon:"🙌",name:"wave",audio:"assets/sounds/actions/wave.mp3"}

];

/* PRAISE */

const praise = [

"assets/sounds/phrases/amazing.mp3",
"assets/sounds/phrases/fantastic.mp3",
"assets/sounds/phrases/keep-going.mp3",
"assets/sounds/phrases/well-done.mp3"

];

/* THEMES */

const themes = [

{
name:"Snow ❄️",
images:["assets/images/themes/snow.webp","assets/images/themes/snow_2.webp"],
objects:["❄️","☃️","🧊","⭐"]
},

{
name:"Garden 🌸",
images:["assets/images/themes/garden.webp","assets/images/themes/garden_2.webp"],
objects:["🌸","🌺","🦋","🌼"]
},

{
name:"Ocean 🌊",
images:["assets/images/themes/ocean.webp","assets/images/themes/ocean_2.webp"],
objects:["🐟","🐠","🫧","🌊"]
},

{
name:"Rainbow 🌈",
images:["assets/images/themes/rainbow.webp","assets/images/themes/rainbow_2.webp"],
objects:["🌈","⭐","💖","☁️"]
},

{
name:"Forest 🌲",
images:["assets/images/themes/forest.webp","assets/images/themes/forest_2.webp"],
objects:["🍃","🌲","🦜","🪵"]
}

];

/* AUDIO */

const laudio = new Audio();
const aaudio = new Audio();
const praiseAudio = new Audio();
const systemAudio = new Audio();

/* STATE */

let current=0;
let stars=0;
let level=1;
let speed=4000;
let autoMode=true;
let bgFlip=true;
let loop;

/* PARTICLES */

function generateThemeObjects(){

  const holder=document.getElementById("particles");

  holder.innerHTML="";

  const theme=themes[(level-1)%themes.length];

  for(let i=0;i<25;i++){

    const obj=document.createElement("div");

    obj.className="floatObj";

    obj.innerText=
      theme.objects[
        Math.floor(Math.random()*theme.objects.length)
      ];

    obj.style.left=Math.random()*100+"vw";

    obj.style.fontSize=(20+Math.random()*25)+"px";

    obj.style.animationDuration=
      (8+Math.random()*10)+"s";

    obj.style.animationDelay=
      (-Math.random()*10)+"s";

    holder.appendChild(obj);

  }

}

/* THEME */

function setTheme(){

  const theme=themes[(level-1)%themes.length];

  document.getElementById("level").innerText=
    `Level ${level} ${theme.name}`;

  const nextBg=bgFlip
    ? document.getElementById("bg2")
    : document.getElementById("bg1");

  const currentBg=bgFlip
    ? document.getElementById("bg1")
    : document.getElementById("bg2");

  nextBg.style.backgroundImage=
    `url('${theme.images[current%2]}')`;

  requestAnimationFrame(()=>{

    nextBg.style.opacity=1;
    currentBg.style.opacity=0;

  });

  bgFlip=!bgFlip;

  generateThemeObjects();

}

/* STAR */

function showStar(){

  stars++;

  document.getElementById("stars").innerText=
    `⭐ ${stars}`;

  document.getElementById("starCount").innerText=
    stars;

  const wrap=document.getElementById("starWrap");

  wrap.classList.remove("starPop");

  void wrap.offsetWidth;

  wrap.classList.add("starPop");

}

/* CONFETTI */

function confetti(){

  const colors=["red","yellow","blue","green","pink","orange"];

  for(let i=0;i<25;i++){

    const c=document.createElement("div");

    c.className="confetti";

    c.style.left=Math.random()*100+"vw";

    c.style.top="-20px";

    c.style.background=
      colors[Math.floor(Math.random()*colors.length)];

    document.body.appendChild(c);

    setTimeout(()=>c.remove(),3000);

  }

}

/* BALLOONS */

function balloons(){

  const arr=["🎈","🎉","🌟","🪅"];

  for(let i=0;i<7;i++){

    const b=document.createElement("div");

    b.className="balloon";

    b.innerText=
      arr[Math.floor(Math.random()*arr.length)];

    b.style.left=Math.random()*100+"vw";

    document.body.appendChild(b);

    setTimeout(()=>b.remove(),5000);

  }

}

/* STEP */

async function playAudio(audio,src){

  return new Promise(resolve=>{

    audio.pause();
    audio.currentTime=0;
    audio.src=src;

    audio.onended=resolve;

    audio.play().catch(resolve);

  });

}

async function step(){

  const L=letters[current];

  const A=
    actions[Math.floor(Math.random()*actions.length)];

  document.getElementById("letter").innerText=L.a;

  const act=document.getElementById("action");

  act.innerText=A.icon;

  act.className="";

  void act.offsetWidth;

  act.classList.add(A.name);

  document.getElementById("phrase").innerText="";

  setTheme();

  /* LETTER */

  await playAudio(laudio,L.audio);

  /* SMALL BUFFER */

  await new Promise(r=>setTimeout(r,350));

  /* ACTION */

  await playAudio(aaudio,A.audio);

  /* PRAISE DELAY */

  await new Promise(r=>setTimeout(r,500));

  /* PRAISE */

  const p=
    praise[Math.floor(Math.random()*praise.length)];

  document.getElementById("phrase").innerText=
    p.split("/").pop().replace(".mp3","").replace("-"," ");

  await playAudio(praiseAudio,p);

}

/* NEXT */

async function next(){

  showStar();

  confetti();

  balloons();

  current++;

  /* LEVEL */

  if(current>0 && current%5===0){

    level++;

    systemAudio.src=
      "assets/sounds/system/level_up.mp3";

    systemAudio.play().catch(()=>{});

  }

  /* BREAK SOUND */

  if(current>0 && current%10===0){

    systemAudio.src=
      "assets/sounds/system/pause.mp3";

    systemAudio.play().catch(()=>{});

  }

  if(current>=letters.length){

    current=0;

    systemAudio.src=
      "assets/sounds/system/start.mp3";

    systemAudio.play().catch(()=>{});

  }

  await step();

}

/* SPEED */

function changeSpeed(){

  speed=
    parseInt(
      document.getElementById("speedSelect").value
    );

  startLoop();

}

/* MODE */

function changeMode(){

  autoMode=
    document.getElementById("modeSelect").value==="auto";

}

/* LOOP */

function startLoop(){

  clearInterval(loop);

  loop=setInterval(()=>{

    if(autoMode){

      next();

    }

  },speed);

}

/* START */

window.onload=async()=>{

  setTheme();

  await step();

  startLoop();

};

</script>

</body>
</html>
